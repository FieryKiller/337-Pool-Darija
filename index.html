think the kernel is still not having any APIs for the\nsame.\nAnyway the file birth time is stored in `ext4` and you can find it out, although\nnot a direct method, but using `debugfs`.\n\n```\n$ sudo debugfs -R \"stat /ABSOLUTE/PATH\" /dev/sdxX | grep crtime\n$ sudo fdisk -l \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\nFor those looking for more go to my [sources](https://unix.stackexchange.com/questions/91197/how-to-find-creation-date-of-file)\nhere.\n", "code": ""}, {"name": "ex05", "readme": "## Git commit\n- Objective: Write a shell script that returns the last 5 hashes in your git #deposit.\n- Used files: git, cat.\n\n## Solution:\n- Git is very usefull tool, check a tutorial.\n```sh\ngit log -5 --format='%H' | cat -e\n```", "code": ""}, {"name": "ex06", "readme": "## Git ignore\n```sh\ngit-clean -Xnd | cut -b 14-256\n```", "code": ""}, {"name": "ex07", "readme": "## EXERCISE 09\n\n* Create a file **b**, so that:\n```\n%>cat -e a\nSTARWARS$\nEpisode IV, A NEW HOPE It is a period of civil war.$\n$\nRebel spaceships, striking from a hidden base, have won their first victory against the evil\nGalactic Empire.$\nDuring the battle, Rebel spies managed to steal secret plans to the Empire\u0001s ultimate weapon, the\nDEATH STAR,$\nan armored space station with enough power to destroy an entire planet.$\n$\nPursued by the Empire\u0001s sinister agents, Princess Leia races home aboard her starship, custodian of\nthe stolen plans that can save her people and restore freedom to the galaxy...$ $\n%>diff a b > sw.diff\n```\n\nHINT: man patch\n\n------------------------------------------\n#### If we RTFM!(`man diff`) we will see that:\n```\nDESCRIPTION\n\t\tCompare FILES line by line.\n```\n\n> And since there is no argument required for `diff a b > sw.diff` we just\ncreate a bile called `b` that is just different enough to file `a` so that the\ncommand may work correctly.\n\n------------------------------------------\n", "code": ""}, {"name": "ex08", "readme": "## EXERCISE 10\n\n* In a file called **clear**, place the command line that will search for all files - in the current directory as well as in its sub-directories - end by ~, and/or all files that start or end by #\n* The command line will show and erase all files found.\n* Only one command is allowed: no ';' or '&&' or other shenanigans.\n\nHINT: man find\n\n------------------------------------------\n## If we STFE!(Search the Fuc***g Ethernet) we will see that:\n\n* `find` is the command that can address all the requirements.\n* so next we can `man find` and we can with the next solution:\n\n```\n$ find . -name \"*~\" -print -delete -o -name \"*#\" -print -delete -o -name \"#*\" -print -delete\n\n-name [pattern]\n\t\tBase of file name (the path with the leading directories removed)\n\t\tmatches shell pattern.\n-print [format]\n-delete:\n\t\tDelete  files;  true  if  removal succeeded.  If the removal failed,\n\t\tan error message is issued.  If -delete fails, find's exit status will\n\t\tbe nonzero (when it eventually exits).  Use of -delete automatically\n\t\tturns on the `-depth' option.\n-o:\n\t\tEnsures that the right hand side is evaluated only for those directories\n\t\twhich didn't get deleted before.\n```\n---------------------\n\n```bash\nfind . -type f \\( -name \"#*#\" -o -name \"*~\" \\) -delete\n```", "code": ""}, {"name": "ex09", "readme": "## EXERCISE 11\n\n* Create a magic file called **ft_magic** that will be formatted appropriately to detect files of 42 file type, built with a \"42\" string at the 42nd byte.\n\nHINT: man file\n\n------------------------------------------\n\n## Summary:\nWe can `man file` for a description for how to use your own magic files.\nFirst run `file -C -m <your magic file>` to compile it,\nand `file -m <your magic file>` to use it.\n\n### To create our magic file (ft_magic) we break down the requirements:\n* File has to be formatted appropriately to detect files of **42 file type**:\n* This file type is defined by having a *42 'string' at the 42nd byte*\n* If we go to `man magic` we can see the following break down:\n```\n42 string 42 magic 42 number found`\n\u2514\u252c\u2518\u2514\u2500\u252c\u2500\u2500\u2518 \u2514\u2500\u2500\u252c\u2500\u2500\u2500\u2518 \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n \u2502   \u2502       \u2502            \u2514\u2500\u2500\u2500 Message\n \u2502   \u2502       \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Test\n \u2502   \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Type\n \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Offset\n```\n> Feel free to modify it to fully comprehend it, if needed.\n\n------------------------------------------", "code": ""}]}, {"day": "Shell01", "exercises": [{"name": "ex01", "readme": "# Exercise 01: print_groups\n\n- Write a command line that will display the list of groups for which the login, contained in the environment variable FT_USER, is a member. Separated by commas without spaces.\n\n- Example:\n\t- for FT_USER=nours, the result is 'god,root,admin,master,nours,local' (without quotation marks)\n\t```\n\t$>./print_groups.sh\n\tgod,root,admin,master,nours,bocal$>\n\t```\n\t- for FT_USER=daemon, the result 'daemon,bin'\n\t```\n\t$>./print_groups.sh\n\tdaemon,bin$>\n\t```\nHINT: `man groups`\nfiles to turn in: print_groups.sh\n\n------------------------------------------\n## If we `man groups` we will see that:\n```\nNAME:\n\tgroups - print the groups a user is in\nSYNOPSIS:\n\tgroups [OPTION]... [USERNAME]...\n\nwhich help to bouild the beggining of the command:\n$ groups $FT_USER\n```\n\n> The result of the command `$ groups $FT_USER` is only displaying the list,\nbut we need to separate it into a comma-separated list.\n\n## Next to make it a comma-separated list we need `man tr` and:\n```\nNAME:\n\ttr - translate or delete characters\nSYNOPSIS:\n\ttr [OPTION]... SET1 [SET2]\nDESCRIPTION:\n\tTranslate, squeeze, and/or delete characters from standard input, writing to\n\tstandard output.\n\t-d, --delete\n\t\tdelete characters in SET1, do not translate\n```\n\n> In this case as the description suggest we we only need one [OPTION], because\nwith the output of `groups $FT_USER` that translate to all the groups that the\nFT_USER belong to, separated by a space and ending with a new line division on\nthe output, we only need to replace the SPACES for COMAS, and delete the ending\nwith `\\n`. So we end up with this:\n```\n$ tr ' ' ','\n$ tr -d '\\n'\n```\n\nBut for this commands to be of use, what we need next is a tool called `PIPES`.\n\n## [Pipeline](https://en.wikipedia.org/wiki/Pipeline_%28Unix%29)\nNow we'll take a look at a mechanism for sending data from one program to\nanother. It's called piping and the operator we use is ( `|` ) (found above the\nbackslash ( `\\` ) key on most keyboards). What this operator does is feed the\noutput from the program on the left as input to the program on the right. In the\nexample below we will list only the first 3 files in the directory.\n```\n$ ls\nbarry.txt bob example.png firstfile foo1 myoutput video.mpeg\n$ ls | head -3\nbarry.txt\nbob\nexample.png\n$\n```\n\n## End result:\nWe can now use this past three elements to create the solution as follows:\n```\n$ groups $FT_USER | tr ' ' ',' | tr -d '\\n'\n```", "code": ""}, {"name": "ex02", "readme": "# Exercise 02: find_sh\n\n- Write a command line that searches for all files names that end with \".sh\" (without quotation marks) in the current directory and all its sub-directories. It should display only the file names without the .sh.\n- Example of output:\n```\n$>./find_sh.sh | cat -e\nfind_sh$\nfile1$\nfile2$\nfile3$\n$>\n```\n\n## Note:\n- From what i understood: `xargs` takes an argument and convert it to a string.\n>xargs (short for \"eXtended ARGuments\") is a command on Unix and most Unix-like operating systems used to build and execute commands from standard input. It converts input from standard input into arguments to a command.\n\n- basename takes the string path and return the name of the file.\n>basename is a standard computer program on Unix and Unix-like operating systems. When basename is given a pathname, it will delete any prefix up to the last slash ( '/' ) character and return the result. basename is described in the Single UNIX Specification and is primarily used in shell scripts.\n\n------------------------------------------\n## Using your favorite search engine go for:\n`command line that searches for all file names that end with \".sh\"`\nAnd you will encounter a variety of answers that range from not necessary to\nvery useful. I found a very nice page with all that we need\n[here](https://unix.stackexchange.com/questions/391872/command-line-bash-sh-filter).\nAs we can see (if this page still exist when you search for it, if not we always\nhave [Wayback Machine](http://archive.org/web/web.php)) the first answer gives\nus this:\n`find . -name \\*.sh -print0 | xargs -0 basename -a -s .sh`\n\n> This is something that need to be modified for a simpler and straightforward\nmethod so that we don't use so many different functions, I'm particularly fond\nof the following method:\n\n`find . -type f -name '*.sh' -printf \"%f\\n\" | sed 's/\\.sh$//'`\n\nHere we get the same result but is more easy to understand, I think:\n```\n-type c\n\tFile is of type c:\n\tb      block (buffered) special\n\n\tc      character (unbuffered) special\n\n\td      directory\n\n\tp      named pipe (FIFO)\n\n\tf      regular file\n\n\tl      symbolic  link; this is never true if the -L option or the -follow\n\toption is in effect, unless the symbolic link is broken. If you want to\n\tsearch for symbolic links when -L is in effect, use -xtype.\n\n\ts      socket\n\n\tD      door (Solaris)\n\n-name pattern\n\tBase of file name (the path with the leading directories removed) matches\n\tshell pattern pattern. Because the leading directories are removed, the file\n\tnames considered for a match with -name will never include a slash, so\n\t`-name a/b' will never match anything (you probably need to use -path instead).\n\tA warning is issued if you try to do this, unless the environment variable\n\tPOSIXLY_CORRECT is set.  The metacharacters (`*', `?', and `[]') match a `.'\n\tat the start of the base name (this is a change in findutils-4.2.2; see\n\tsection STANDARDS CONFORMANCE below). To ignore a directory and the files\n\tunder it, use -prune; see an example in the description of -path. Braces are\n\tnot recognized as being special, despite the fact that some shells including\n\tBash imbue braces with a special meaning in shell patterns. The filename\n\tmatching  is performed with the use of the fnmatch(3) library function.\n\tDon't forget to enclose the pattern in quotes in order to protect it from\n\texpansion by the shell.\n\n-printf format\n\tTrue; print format on the standard output, interpreting `\\' escapes and `%'\n\tdirectives. Field widths and precision can be specified as with the `printf'\n\tC function. Please note that many of the fields are printed as %s rather\n\tthan %d, and this may mean that flags don't work as you might expect. This\n\talso means that the `-' flag does work (it forces fields to be left-aligned).\n\tUnlike -print, -printf does not add a newline at the end of the string.\n\tThe escapes and directives are:\n%f: File's name with any leading directories removed (only the last element).\n```\n\n## Solution for the message \"bash: ./find_sh.sh Permission denied\u201d:\n```\n$ chmod u+x find_sh.sh\n```", "code": ""}, {"name": "ex03", "readme": "# Exercise 03: count_files\n\n- Write a command line that counts and displays the number of regular files and directories in the current directory and all its sub-directories. It should include \".\", the starting directory.\n- Example of output:\n```\n$>./count_files.sh | cat -e\n42$\n$>\n```\n\n------------------------------------------\n## Using your favorite search engine go for:\n`Recursively counting files in a Linux directory`\nAnd you will encounter a variety of answers that range from not necessary to\nvery useful. I found a very nice page with all that we need\n[here](https://stackoverflow.com/questions/9157138/recursively-counting-files-in-a-linux-directory).\nAs we can see (if this page still exist when you search for it, if not we always\nhave [Wayback Machine](http://archive.org/web/web.php)) the first answer gives\nus this:\n`find DIR_NAME -type f | wc -l`\n\n**Explanation:**\n* Replace *DIR_NAME* with __.__ to execute the command in the current folder.\n* We remove the __-type f__ because that limits the search to ONLY files.\n* __|__ redirects find command's standard output to wc command's standard input.\n* __wc__ (short for word count) counts newlines, words and bytes on its input.\n* __-l__ to count just newlines.\n\n**Result:**\n`find . | wc -l`\n\n> Note: remember to make the file executable so we don't end up with this error\nmessage: 'bash: ./count_files.sh: Permission denied' by running this command:\n__chmod u+x count_files.sh__.", "code": ""}, {"name": "ex04", "readme": "# Exercise 04: MAC\n\n- Write a command line that displays your machine's MAC addresses. Each address must be followed by a line break.\n\nHIND: `man ifconfig`\n\n------------------------------------------\n## First lets see the options for IFCONFIG on `man ifconfig`\n* Due to the present requirements we can see that we need the flag[OPTION] `-a`\nbecause that one `display all interfaces which are currently available,\neven if down`\n* And now we run the `ifconfig -a` to see the output, because depending on your\nsystem output the future commands may need some tweaking.\n\n------------------------------------------\n## Here are a few ways:\n\n* __grep__. There are various regular expressions that will pick these up. Here,\nI am looking for 5 repetitions of 2 letters or numbers followed by a colon, then\nany two characters. The **-i** makes the match case insensitive and the **-o**\nmakes grep print only the matched portion. **-E** enables extended regular\nexpressions. The same regex also works with PCREs (**-P**).\n```\nifconfig -a | grep -ioE '([a-z0-9]{2}:){5}..'\n```\n\n* __sed__. The **-n** suppresses normal output and the **-r** enables extended\nregular expressions. Using the same regex as above, this script will attempt to\nreplace everything on the line with the part of it that matches the regex. If\nthe substitution was successful, the resulting line is printed\n(because of the p at the end of the substitution).\n```\nifconfig -a | sed -rn 's/.*(([a-z0-9]{2}:){5}..).*/\\1/p'\n```\n\n* __awk__. If the line starts with a word character *([a-zA-Z0-9_])*, and has\n5 fields, print the last one.\n```\nifconfig -a | awk '/^\\w/&&NF==5{print $NF}'\n```\n\n* __Perl__, where, as usual, there are more than one ways to do it. This one is\nthe same logic as the awk above. The **-a** tells perl to split each input line\ninto the @F array.\n```\nifconfig -a | perl -lane 'if(/^\\w/&&$#F==4){print $F[$#F]}'\n```\nAlternatively, you can use the regex from the previous approaches:\n```\nifconfig -a | perl -lne '/(([a-z0-9]{2}:){5}..)/ && print $1'\n```\n\n* __Coreutils__.\n```\nLANG_ALL=C ifconfig -a | grep 'ether' | tr -s ' ' '\\t' | cut -f 3\n```\nOR\n```\nLANG_ALL=C ifconfig -a | grep 'HWadd' | tr -s ' ' '\\t' | cut -f 5\n```\n\n> In the end we can mix the concepts and come with a simplified way or use\nanother one entirely, for example I just think this is a good answer if you're\ndoing this on a linux machine like me:\n\n```\nifconfig -a | grep ether | awk '{print $2}'\n```\nI chose this option since my MAC addresses are next to the word \"ether\" so the\noption grep gives me back the line where this word happens, and next with awk\nI can select the second group of word per line, which are the MACs.", "code": ""}, {"name": "ex05", "readme": "# Exercise 05: Can you create it?\n\n- Create a file containing only \"42\", and NOTHING else.\n- Its name will be: `\"\\?$*\u0001MaRViN\u0001*$?\\\"`\n- Example:\n```\n$>ls -lRa *waM* | cat -e\n-rw---xr-- 1 75355 32015 2 Oct 2 12:21 \"\\?$*\u0001KwaMe\u0001*$?\\\"$\n$>\n```\n------------------------------------------\n## There are two solutions (that I know of) for this:\n* The easiest is just use the command `touch` to create the file and we need to\nspecify the name like this:\n\t```\n\ttouch \\\"\\\\\\?\\$\\*'KwaMe'\\*\\$\\?\\\\\\\"\n\t```\n* And the other way is just to create a temp file with whichever name you want\nand rename it to \"\\?$*'MaRViN'*$?\\\"\n\n> Let's not forget to include the '42' inside that file after completing the\nprevious steps.\n", "code": ""}, {"name": "ex06", "readme": "# Exercise 06: Skip\n\n- Write a command line that displays every other line for the command ls -l, starting from the first line.\n\n------------------------------------------\n## We can use `ls` in combination with `awk` for this:\n* First we use the command `ls -l` to display all contents on the current\ndirectory in a list format, then pass the results forward using pipe `|` for\n`awk` with the option:\nNR \u2192 The total number of input records seen so far.\nAnd the `% 2 == 1` to print every second line counting from line 0.\n\t```\n\tls -l | awk 'NR % 2 == 1'\n\t```", "code": ""}, {"name": "ex07", "readme": "# Exercise 07: r_dwssap\n\n- Write a command line that displays the output of a cat /etc/passwd command, removing comments, every other line starting from the second line, reversing each lo- gin, sorted in reverse alphabetical order, and keeping only logins between FT_LINE1 and FT_LINE2 included, and they must separated by \", \" (without quotation marks), and the output must end with a \".\".\n\n- Example: Between lines 8 and 16, the result should be something like this:\n```\n$> ./r_dwssap.sh\nsstq_, sorebrek_brk_, soibten_, sergtsop_, scodved_, rlaxcm_, rgmecived_, revreswodniw_, revressta_\n.$>\n```\n\nHINT: Rigorously follow the order indicated in the instructions.", "code": ""}, {"name": "ex08", "readme": "# Exercise 09: add_chelou\n\n- Write a command line that takes numbers from variables FT_NBR1, in \u2019\\\"?! base, and FT_NBR2, in mrdoc base, and displays the sum of both in gtaio luSnemf base.\n\n\n\t- Example 1:\n\t```\n\tFT_NBR1=\\\u0001?\"\\\"\u0001\\\n\tFT_NBR2=rcrdmddd\n\t```\n\t- The sum is:\n\t```\n\tSalut\n\t```\n\t- Example 2:\n\t```\n\tFT_NBR1=\\\"\\\"!\\\"\\\"!\\\"\\\"!\\\"\\\"!\\\"\\\"!\\\"\\\"\n\tFT_NBR2=dcrcmcmooododmrrrmorcmcrmomo\n\t```\n\t- The sum is:\n\t```\n\tSegmentation fault\n\t```\n\n## Notes\n\n### Replacement command: substitution\n```\nsed 's/search-pattern/replecement-string/flags'\n```\n- the flag `-i` stands for in place editing (to save the changes to the file).\n- Sed goes through each lines at a time and change the first occurrence of the matching pattern with the replacement.\n- It is optional to add flags\n- Idk if you can add more than 1 flag and how (yet)\n- By default, only the first occurrence of the matching pattern in the current line gonna get replaced, to change that you need to add the flag `g` for global.\n- [Error: extra characters at the end of l command](https://stackoverflow.com/questions/35620009/sed-extra-characters-at-end-of-l-command)\n- Instead of forward slash `/` you can use any symbol by using it like this: `s#pattern#replacement`\n\n\n### Delete command: d\n```\nsed '/This/d' filename.txt\n# delete all the lines that contains the word 'This'\n```\n- To use multiple commands or multiple sed expressions we use `;` `sed '/^#/d ; /^$/d' filename.txt` or use the `-e` option.\n\n\n## Resources\n\n- [sed, a stream editor](https://www.gnu.org/software/sed/manual/sed.html)\n- [Sed - Intro and Tutorial by Bruce Barnett](https://www.grymoire.com/Unix/Sed.html)\n- [Sed basics](https://www.youtube.com/watch?v=qEA7FGNAMrU)\n- [RegEx](https://www.youtube.com/watch?v=AHn9HMTG9Yc)\n- [Sed Tutorial - tutorialspoint](https://www.tutorialspoint.com/sed/index.htm)\n- [Linux sed command](https://www.computerhope.com/unix/used.htm)\n- [Sed: a 5min practical guide](https://cameronnokes.com/blog/sed-5-min-practical-guide/)\n- [Sed advanced](https://www.linuxtopia.org/online_books/advanced_bash_scripting_guide/x17375.html)", "code": ""}]}];

        function initNav() {
            const container = document.getElementById('nav-container');
            container.innerHTML = '';

            data.forEach((dayData, dIndex) => {
                // create group
                const group = document.createElement('div');
                group.className = 'day-group';
                
                // Day button
                const dayBtn = document.createElement('button');
                dayBtn.className = 'day-btn';
                
                const t = isDarija ? translations.darija : translations.eng;
                const dName = dayData.day.replace('C', '').replace('Shell', '');
                const prefix = dayData.day.includes('Shell') ? 'Shell ' : t.day + ' ';
                
                dayBtn.innerHTML = `<span>${prefix} ${dName}</span> <span>▼</span>`;
                
                // Exercises list
                const list = document.createElement('div');
                list.className = 'exercises-list';
                if(dIndex === currentDayIndex) list.classList.add('active');

                dayData.exercises.forEach((ex, eIndex) => {
                    const exBtn = document.createElement('button');
                    exBtn.className = 'ex-btn';
                    if(dIndex === currentDayIndex && eIndex === currentExIndex) exBtn.classList.add('active');
                    exBtn.innerText = `${t.ex} ${ex.name.replace('ex', '')}`;
                    exBtn.onclick = () => loadExercise(dIndex, eIndex);
                    list.appendChild(exBtn);
                });

                dayBtn.onclick = () => {
                    list.classList.toggle('active');
                };

                group.appendChild(dayBtn);
                group.appendChild(list);
                container.appendChild(group);
            });
        }

        function loadExercise(dIndex, eIndex) {
            currentDayIndex = dIndex;
            currentExIndex = eIndex;
            
            initNav(); // Re-render nav to show active states

            const ex = data[dIndex].exercises[eIndex];
            const dName = data[dIndex].day;
            
            const t = isDarija ? translations.darija : translations.eng;
            
            document.getElementById('current-title').innerText = `${t.ex} ${ex.name.replace('ex', '')}`;
            document.getElementById('current-day-label').innerText = dName;
            
            // Format README with basic HTML (bold, code blocks etc)
            let formattedReadme = ex.readme
                .replace(/```[a-zA-Z]*\n([\s\S]*?)```/g, '<pre style="background:rgba(0,0,0,0.3);padding:1rem;border-radius:6px;margin:0.5rem 0">$1</pre>')
                .replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.3);padding:0.1rem 0.3rem;border-radius:4px;color:var(--primary)">$1</code>');
                
            document.getElementById('instruction-content').innerHTML = formattedReadme;

            // Render Code with Blanks
            if (!ex.code || ex.code.length < 5) {
                document.getElementById('code-content').innerHTML = "// Lcode mamsali ola makaynch f had tmarin. (No code snippet available)";    
            } else {
                // Parse [[answer]] logic into inputs
                let htmlCode = ex.code.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                
                htmlCode = htmlCode.replace(/\[\[(.*?)\]\]/g, (match, word) => {
                    const size = Math.max(word.length * 10, 40);
                    return `<input type="text" data-answer="${word}" class="blank-input" style="width: ${size}px" autocomplete="off" spellcheck="false"/>`;
                });
                
                document.getElementById('code-content').innerHTML = htmlCode;
            }

            resetUI();
        }

        function checkAnswers() {
            const inputs = document.querySelectorAll('.blank-input');
            if(inputs.length === 0) return; // nothing to check

            let allCorrect = true;
            
            inputs.forEach(input => {
                const correctAns = input.getAttribute('data-answer');
                const userAns = input.value.trim();
                
                if (userAns === correctAns) {
                    input.classList.remove('incorrect');
                    input.classList.add('correct');
                } else {
                    input.classList.remove('correct');
                    input.classList.add('incorrect');
                    allCorrect = false;
                }
            });

            const msg = document.getElementById('status-msg');
            const t = isDarija ? translations.darija : translations.eng;

            if (allCorrect) {
                msg.innerText = t.success;
                msg.className = 'status-msg show-success';
                document.getElementById('next-btn').style.display = 'flex';
                document.getElementById('check-btn').style.display = 'none';
                
                // create confetti effect
                createConfetti();
            } else {
                msg.innerText = t.error;
                msg.className = 'status-msg show-error';
            }
        }

        function nextExercise() {
            if (currentExIndex < data[currentDayIndex].exercises.length - 1) {
                loadExercise(currentDayIndex, currentExIndex + 1);
            } else if (currentDayIndex < data.length - 1) {
                loadExercise(currentDayIndex + 1, 0);
            }
        }

        function resetUI() {
            document.getElementById('status-msg').className = 'status-msg';
            document.getElementById('status-msg').innerText = '';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('check-btn').style.display = 'flex';
        }

        function toggleLanguage() {
            isDarija = !isDarija;
            
            const t = isDarija ? translations.darija : translations.eng;
            
            document.getElementById('t_subtitle').innerText = t.subtitle;
            document.getElementById('t_instruction_header').innerText = t.inst_header;
            document.getElementById('t_code_header').innerText = t.code_header;
            document.getElementById('t_check_btn').innerText = t.check_btn;
            document.getElementById('t_next_btn').innerText = t.next_btn;
            document.getElementById('langBtn').innerText = t.lang_btn;
            
            // Re-render
            loadExercise(currentDayIndex, currentExIndex);
        }

        // Simple confetti function
        function createConfetti() {
            for(let i=0; i<30; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = -10 + 'px';
                confetti.style.width = '8px';
                confetti.style.height = '8px';
                confetti.style.backgroundColor = ['#38bdf8', '#22c55e', '#f59e0b', '#ef4444'][Math.floor(Math.random()*4)];
                confetti.style.borderRadius = '50%';
                confetti.style.zIndex = 9999;
                confetti.style.pointerEvents = 'none';
                document.body.appendChild(confetti);
                
                const duration = Math.random() * 2 + 1;
                
                confetti.animate([
                    { transform: `translate3d(0,0,0) rotate(0)`, opacity: 1 },
                    { transform: `translate3d(${Math.random()*100 - 50}px, 100vh, 0) rotate(360deg)`, opacity: 0 }
                ], {
                    duration: duration * 1000,
                    easing: 'cubic-bezier(.37,0,.63,1)',
                    fill: 'forwards'
                });
                
                setTimeout(() => confetti.remove(), duration*1000);
            }
        }

        // Init App On Load
        window.onload = () => {
            initNav();
            if(data.length > 0) loadExercise(0, 0);
        };
        
    </script>
</body>
</html>
