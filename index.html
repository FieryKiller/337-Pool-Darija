<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1337 Pool - Darija Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --primary: #38bdf8;
            --primary-hover: #0284c7;
            --success: #22c55e;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --glass: rgba(30, 41, 59, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(56, 189, 248, 0.05), transparent 25%);
        }

        /* Sidebar Styles */
        .sidebar {
            width: 320px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 0;
            height: 100%;
            z-index: 10;
        }

        .brand {
            padding: 0 1.5rem 1.5rem;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .brand h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }
        
        .brand p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .nav-sections {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .day-group {
            margin-bottom: 0.5rem;
        }

        .day-btn {
            width: 100%;
            text-align: left;
            padding: 0.75rem 1rem;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .day-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .exercises-list {
            display: none;
            padding-left: 1rem;
            margin-top: 0.5rem;
        }
        .exercises-list.active {
            display: block;
        }

        .ex-btn {
            width: 100%;
            text-align: left;
            padding: 0.5rem 1rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            margin-bottom: 0.25rem;
            position: relative;
        }

        .ex-btn:hover, .ex-btn.active {
            color: var(--primary);
            background: rgba(56, 189, 248, 0.1);
        }

        .ex-btn::before {
            content: "•";
            position: absolute;
            left: 0;
            opacity: 0;
        }

        .ex-btn.active::before {
            opacity: 1;
            color: var(--primary);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
        }

        header h2 {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .top-controls button {
            padding: 0.5rem 1rem;
            background: var(--primary);
            border: none;
            color: #000;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .top-controls button:hover {
            background: var(--primary-hover);
        }

        .content-area {
            flex: 1;
            display: flex;
            padding: 2rem;
            gap: 2rem;
            overflow-y: auto;
        }

        .instruction-panel, .code-panel {
            flex: 1;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary);
        }

        .panel-content {
            padding: 1.5rem;
            flex: 1;
            overflow-y: auto;
            line-height: 1.6;
            color: var(--text-muted);
            white-space: pre-wrap;
        }

        .code-container {
            font-family: 'Fira Code', monospace;
            background: #0d1117;
            padding: 1.5rem;
            border-radius: 8px;
            color: #c9d1d9;
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        input.blank-input {
            background: #161b22;
            border: 1px dashed var(--primary);
            color: var(--primary);
            font-family: 'Fira Code', monospace;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            width: 80px;
            text-align: center;
            outline: none;
            transition: all 0.2s;
            display: inline-block;
        }

        input.blank-input:focus {
            border-style: solid;
            background: rgba(56, 189, 248, 0.1);
        }

        input.blank-input.correct {
            border-color: var(--success);
            color: var(--success);
            background: rgba(34, 197, 94, 0.1);
            pointer-events: none;
        }

        input.blank-input.incorrect {
            border-color: var(--danger);
            color: var(--danger);
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        .action-bar {
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.1);
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-check {
            background: var(--primary);
            color: #000;
        }

        .btn-check:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-next {
            background: var(--success);
            color: #fff;
            display: none;
        }
        
        .btn-next:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .status-msg {
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .status-msg.show-success {
            color: var(--success);
            opacity: 1;
        }

        .status-msg.show-error {
            color: var(--danger);
            opacity: 1;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
        
        /* Language Toggle */
        .lang-toggle {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .lang-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

    <script>
        const data = [{"day": "C00", "exercises": [{"name": "ex00", "readme": "## EXERCISE 00\n* Write a function that displays characters passed as parameter.\n* This is how it should be prototyped:\n```C\nvoid\tft_putchar(char c);\n```\n* Files to turn in: ft_putchar.c\n* Allowed function: write\n\n### write()\n- write(2): the write function takes 3 parameters\n\n\tI. file descriptor\\\n\tII. address to a buffer\\\n\tIII. count\n\n\t- 1. There is 3 types of file descriptor:\n\t\t* 0 standart input.\n\t\t* 1 standard output.\n\t\t* 2 standart error.\t\n\t- 2. Address in memory that points to a string (if we write the string directly, the compiler will find a place in memory for it and place the address of it in the second parameter).\n\t- 3. The length: number of bytes to print", "code": "#include <unistd.h>\n\n[[void]]\tft_putchar([[char]] c)\n{\n\t[[write]](1, &c, 1);\n}"}, {"name": "ex01", "readme": "## EXERCISE 01\n* Create a function that displays the alphabet in lowercase, on a single line, by ascending order, starting from the letter 'a'.\n* Here's how it should be prototyped:\n```C\nvoid\tft_print_alphabet(void);\n```\n* Files to turn in: ft_print_alphabet.c\n* Allowed funcitons: ft_putchar", "code": "#include <unistd.h>\n\n[[void]]\tft_print_alphabet(void)\n{\n    [[int]] x;\n    x = 'a';\n\n    [[while]] (x <= 'z')\n    {\n        write(1, &x, 1);\n        x++;\n    }   \n}"}, {"name": "ex02", "readme": "## EXERCISE 02\n* Create a function that displays the alphabet in lowercase, on a single line, by descending order, starting from the letter 'z'.\n* Here's how it should be prototyped:\n```C\nvoid\tft_print_reverse_alphabet(void);\n```\n* Files to turn in: fr_reverse_alphabet.c\n* Allowed functions: ft_putchar\n", "code": "#include <unistd.h>\n\n[[void]]\tft_print_reverse_alphabet(void)\n{\n    [[char]] x;\n    x = 'z';\n\n    [[while]] (x >= 'a')\n    {\n        write(1, &x, 1);\n        x--;\n    }\n}"}, {"name": "ex03", "readme": "## EXERCISE 03\n* Create a function that displays all digits, on a single line, by ascending order.\n* Here's how it should be prototyped:\n```C\nvoid\tft_print_numbers(void);\n```\n* Files to turn in: ft_print_numbers.c\n* Allowed functions: ft_putchar", "code": "#include <unistd.h>\n\n[[void]]\tft_print_numbers(void)\n{\n    [[char]] x;\n    x = '0';\n    [[while]] (x <= '9')\n    {\n        write(1, &x, 1);\n        x++;\n    }  \n}"}, {"name": "ex04", "readme": "## EXERCISE 04\n* Create a function that displays 'N' or 'P' depending on the integer's sign entered as a parameter. If **n** is negative, display 'N', if **n** is positive or null, display 'P'.\n* Here's how it should be prototyped:\n```C\nvoid\tft_is_negative(int n);\n```\n* Files to turn in: ft_is_negative.c\n* Allowed funcitons: ft_putchar", "code": "#include <unistd.h>\n\n[[void]]\tft_is_negative([[int]] n)\n{\n    [[if]] (n < 0)\n        write(1, \"N\", 1);\n    else\n        write(1, \"P\", 1);\n}"}, {"name": "ex05", "readme": "## EXERCISE 05\n* Create a function that displays all different combinations of three different digits in ascending order, listed by ascending order - yes, repetition is voluntary.\n* Here's the intended output:\n```\n$>./a.out | cat -e\n012, 013, 014, 015, 016, 017, 018, 019, 023, ..., 789$>\n```\n* 987 isn't there because 789 already is.\n* 999 isn't there because digit 9 is present more than once.\n* Here's how it should be prototyped:\n```C\nvoid\tft_print_comb(void);\n```\n+ Files to turn in: ft_print_comb.c\n+ Allowed functions: ft_putchar\n\n\n## Solution\n\n- Considering d = digit, so d3 d2 d1\n  and because the digits has to be listed in ascending order\n  we need to start from 000, but remember repetition isn't allowed.\n  let's start with the possibilities.\n  some number has to go fist and there is 10 possibilities.\n  We gonna start with d1 because that's the first number\n  we can put 10 possibilities there from 0 to 9, d3 d2 9\n  now but things gets a little different for the second number\n  we no longer have 10 options because whatever digit does first\n  we can't use it again.\n  So now there is only 9 possibilities (0 to 8): d3 8 9\n  then for the third digit we there are now 8 possibilities\n  (0 to 7): 7 8 9.\n  \n- We notice that it starts with 012 and ends with 789\n  in other words if \n  - d3 = n\n  - d2 = d3 + 1\n  - d1 = d2 + 1\n\n- The ```ft_putchar(d + '0')```\n  We know that if the input is char representation of a digit\n  and we want to get the actual value of that digit we need \n  to use ```d - '0'``` taking in consideration that 'd' is\n  a char data type.\n  Therefore if we want to opsite we reverse the formula.", "code": "#include <unistd.h>\n\n[[void]] ft_putchar([[char]] c)\n{\n    write(1, &c, 1);\n}\n\nvoid ft_print_numbers(char a, char b, char c)\n{\n    ft_putchar(a);\n    ft_putchar(b);\n    ft_putchar(c);\n    if (a <= '7')\n    {\n        ft_putchar(',');\n        ft_putchar(' ');\n    }    \n}\n\nvoid\tft_print_comb(void)\n{\n    char a;\n    char b;\n    char c;\n\n    a = '0';\n    [[while]] (a <= '7')\n    {\n        b = a + 1;\n        while (b <= '8')\n        {\n            c = b +1;\n            while (c <= '9')\n            {\n                ft_print_numbers(a, b, c);\n                c++;\n            }\n            \n            b++;\n        }\n\n        a++;\n    }\n\n}"}, {"name": "ex06", "readme": "## EXERCISE 06\n* Create a function that displays all different combinations of two digits between 00 and 99, listed by ascending order.\n* Here's the expected output:\n```\n$>./a.out | cat -e\n00 01, 00 02, 00 03, 00 04, 00 05, ..., 00 99, 01 02, ..., 97 99, 98 99$>\n```\n* Here's how it should be prototyped:\n```C\nvoid\tft_print_comb2(void);\n```\n+ Files to turn in: ft_print_comb2.c\n+ Allowed functions: ft_putchar", "code": "#include <unistd.h>\n\n[[void]] ft_putchar(char c)\n{\n    write(1, &c, 1);\n}\n\nvoid    ft_print_numbers([[int]] a, int b)\n{\n    ft_putchar((a / 10) + '0');\n    ft_putchar((a % 10) + '0');\n    ft_putchar(' ');\n    ft_putchar((b / 10) + '0');\n    ft_putchar((b % 10) + '0');\n    if (a <= 98)\n    {\n        ft_putchar(',');\n        ft_putchar(' ');\n    }\n}\nvoid\tft_print_comb2(void)\n{\n    int x;\n    int y;\n\n    x = 0;\n\n    [[while]] (x <= 98)\n    {\n        y = x + 1;\n        while (y <= 99)\n        {\n            ft_print_numbers(x, y);\n            y++;\n        }\n        x++;\n        \n    }\n    \n}"}, {"name": "ex07", "readme": "## EXERCISE 07\n* Create a function that displays the number entered as a parameter. The function has to be able to display all possible values within an int type variable.\n* Here's how it should be prototyped:\n```C\nvoid\tft_putnbr(int nbr);\n```\n* For example:\n\t* ft_putnbr(1337) displays '1337'.\n+ Files to turn in: ft_putnbr.c\n+ Allowed functions: ft_putchar\n\n### Resources\n1. [printing a integer variable using putchar()](https://bytes.com/topic/c/answers/594812-printing-integer-variable-using-putchar)\n2. [How to Print a Long Integer Using Only putchar()](https://wuhrr.wordpress.com/2007/11/09/how-to-print-a-long-integer-using-only-putchar/)\n3. [Split a number into digits](https://www.log2base2.com/c-examples/loop/split-a-number-into-digits-in-c.html)", "code": "#include <unistd.h>\n\n[[void]]\tft_putchar(char c)\n{\n\twrite(1, &c, 1);\n}\n\nvoid\tft_putnbr([[int]] nb)\n{\n\tif (nb == -2147483648)\n\t{\n\t\tft_putchar('-');\n\t\tft_putchar('2');\n\t\tft_putnbr(147483648);\n\t} \n\tif (nb < 0)\n\t{\n\t\tft_putchar('-');\n\t\tnb = -nb;\n\t\tft_putnbr(nb);\n\t}\n\telse if (nb > 9)\n\t{\n\t\tft_putnbr(nb / 10);\n\t\tft_putnbr(nb % 10);\n\t}\n\telse\n\t\t ft_putchar(nb + 48);\n}\n\nint main()\n{\n\tft_putnbr(235353345);\n\n\t[[return]] 0;\n}"}, {"name": "ex08", "readme": "## EXERCISE 08\n* Create a function that displays all different combinations of **n** numbers by ascending order.\n* **n** will be so that: 0 < n < 10.\n* If **n** == 2, here's the expected output:\n```\n$>. , 356789, 456789\n\u279c  ex08 git:(master) \u2717 ./a.out 7\n0123456, 0123457, 0123458, 0123459, 0123467, 0123468, 0123469, 0123478, 0123479, 0123489, 0123567, 0123568, 0123569, 0123578, 0123579, 0123589, 0123678, 0123679, 0123689, 0123789, 0124567, 0124568, 0124569, 0124578, 0124579, 0124589, 0124678, 0124679, 0124689, 0124789, 0125678, 0125679, 0125689, 0125789, 0126789, 0134567, 0134568, 0134569, 0134578, 0134579, 0134589, 0134678, 0134679, 0134689, 0134789, 0135678, 0135679, 0135689, 0135789, 0136789, 0145678, 0145679, 0145689, 0145789, 0146789, 0156789, 0234567, 0234568, 0234569, 0234578, 0234579, 0234589, 0234678, 0234679, 0234689, 0234789, 0235678, 0235679, 0235689, 0235789, 0236789, 0245678, 0245679, 0245689, 0245789, 0246789, 0256789, 0345678, 0345679, 0345689, 0345789, 0346789, 0356789, 0456789, 1234567, 1234568, 1234569, 1234578, 1234579, 1234589, 1234678, 1234679, 1234689, 1234789, 1235678, 1235679, 1235689, 1235789, 1236789, 1245678, 1245679, 1245689, 1245789, 1246789, 1256789, 1345678, 1345679, 1345689, 1345789, 1346789, 1356789, 1456789, 2345678, 2345679, 2345689, 2345789, 2346789, 2356789, 2456789, 3456789\n\u279c  ex08 git:(master) \u2717 ./a.out 8\n01234567, 01234568, 01234569, 01234578, 01234579, 01234589, 01234678, 01234679, 01234689, 01234789, 01235678, 01235679, 01235689, 01235789, 01236789, 01245678, 01245679, 01245689, 01245789, 01246789, 01256789, 01345678, 01345679, 01345689, 01345789, 01346789, 01356789, 01456789, 02345678, 02345679, 02345689, 02345789, 02346789, 02356789, 02456789, 03456789, 12345678, 12345679, 12345689, 12345789, 12346789, 12356789, 12456789, 13456789, 23456789\n\u279c  ex08 git:(master) \u2717 ./a.out 9\n012345678, 012345679, 012345689, 012345789, 012346789, 012356789, 012456789, 013456789, 023456789, 123456789\n```\n\n## EXPLAINING\n\n### ft_print_combn() function\n\nCheck the examples.\n\n1. We initialize the variable size to hold the input number.\n2. Initialize an array with [size] as its size.\n3. Initialize an index variable to hold the indexes of the array which is (size - 1)\\\n\twhich is the index of the last element.\n4. We have to go through the array from last to first starting from the last element\\\n\tdown to the first element. and the last element is size - 1 which is the index\\\n\tvariable now. So we make a while loop while(index >= 0) while the index isn't\\\n\tthe first element we go through the array and assaign the value of index to\\\n\tthe current element, and then decrement index-- and repread the process.\\\n\tfor example if the input is 9 the array gonna be like {0, 1, 2, 3, 4, 5, 6, 7, 8}.\n5. Print the array before stating incrementing any value.\n6. Starting a while loop with the condition to check if the first element of the array == 10 - the input.\\\n\tfor example: if the input is 4 the array gonna be like {0, 1, 2, 3}\\\n\t10 - 4 = 6.\\\n\tso as long as the the first element is equal or less than 6 the loop gonna continue.\\\n\t6 because the final result must be {6, 7, 8, 9}\n7. We check if the last element is less than 9, if true we increment the last element\\\tand we gonna keep incrementing it as long as it is still less than 9, we stop once we reach number 9.\\\n\tif the value of the last element is 9\\\n\twe check_array() and pass the return value to index.\\\n\tthen we check if the value of index is less or equal to 0\\\n\t(because if it is the it means we reached the end of the program)\\\n\tif true we break from the while loop.\\\n\tthen we reset_array().\\\n\tthen we print_array() the chanches.\\\n\n### check_array() function\n\nThe function take an array and the length of the array and return an integer that represent an index of the array.\\\nWe get the index by start counting from behind and check if the element before the last == the last element - 1, and go through the array till the condition is no longer true.\n\nfor example:\\\nsuppose we have the number 1999\\\nthe index number is the number 9 after 1 -> 1(9)99 because it is not possible to increment all the 9 number after the number 1, and in 1299 the index number is 12(9)9\\\nin our exercise because we cannot have 999 because of the rule that we have to get an output of a decremented numbers from 9--.\\\nThe other example es: 1789.\\\nHere the index number is 7.. 1(7)89.\\\nmore examples: 012(9), 0(1), 123(8)9.. and so on.\n\n1. We initialize index to the size of the array - 1\n2. While the index is greater than or equal to 0 and the last element of the array == 9. (starting from the last elemet)\n3. While the condition above is true we check if the element in the current index equal to the element after the index - 1\n4. While the condition above is true we decrement the index by 1, and check go back to step 3.\n5. If false we break from the loop and return the index.\n\nNote: if the index is equal or less than 0 it means that hit the final number of the program ex: 6789 (if the input is 4 and the starting number is 0123)\n\n### reset_array() function:\n\nThe idea behind reset_array() is simple, it takes three parameters (array, size of array and an index), the index is the position where the last number who reached the point of limit, which is the return value from check_array().\\\nIt takes the array and the length of the array + the index where to start the reset from\\\nfor example suppose out array is {0, 1, 2, 3, 7, 8, 9}\\\nThe index is gonna 4\\\nso the function gonna increase the value of index[4 - 1]\nand go through the array giving the next index the value of the previous [index] + 1\\\nso the result of out example gonna be {0, 1, 2, 4, 5, 6, 7}\\\n\n1. First we initialize (i) to the number before the index\\\n\tex: index = 1(7)89\\\n\ti = index - 1\\\n\ti = (1)789\n2. Increment i by 1. (i++) -> 2789\n3. While the two conditions is true\n\t- (i < size of array - 1) (size - 1) is the last element of the array\n \tbecause we need to increment the i + 1 element till we reach the end \n\tof the array.\n\t- We can check if (i >= 0) but it is not necessary because if (i >= 0)\n\tthe program ends before we reach this point for the first place.\n4. While the condition above is true\n\t- We give the number that comes after (i) (i = (2)789) (i + 1 = 2(7)89)\n\tthe value of (i) + 1;\\\n\t-> Then 2(3)89\\\n\tnow we increment (i) by 1, therefore (i) now point to the next element\\\n\tand keep repeating this action till we hit the last elemet\\\n\tso the final result is 2345\n\n\nNote : The greater the number is, the slower the compilation goes, that's why i optimized my code very well.\n\n\n### BUGS I FACED\n+ I forgot to check the return value of the \"check array\" function, and therefore i get a segmentation fault error. Because it is suppose to return -1 when we reach the final result, so because i forgot to check for that, i kept getting the error because the functions kept writing values outside of the array.", "code": "#include <unistd.h>\n\n[[void]]\tprint_combn(char\t*num, [[int]]\tnum_size,\tint\tindex,\tchar\tdigit)\n{\n\tif (index == num_size)\n\t{\n\t\twrite(1, num, num_size);\n\t\tif (num[0] - '0' < 10 - num_size)\n\t\t\twrite(1, \", \", 2);\n\t}\n\telse\n\t{\n\t\t[[while]] (digit - '0' <= (10 - num_size) + index)\n\t\t{\n\t\t\tnum[index] = digit;\n\t\t\tprint_combn(num, num_size, index + 1, digit + 1);\n\t\t\tdigit++;\n\t\t}\n\t}\n}\n\nvoid\tft_print_combn(int\tn)\n{\n\tchar\tnum[9];\n\n\tif (n > 0 && n < 10)\n\t\tprint_combn(num, n, 0, '0');\n}\n\nint\tmain(void)\n{\n\tft_print_combn(5);\n}"}]}, {"day": "C01", "exercises": [{"name": "ex00", "readme": "## Exercise 00: ft_ft\n+ Create a function that takes a pointer to int as parameter, and sets the value \"42\" to that int.\n+ Here's how it should be prototyped:\n```C\nvoid\tft_ft(int *nbr);\n```\n+ Files to turn in: ft_ft.c\n+ Allowed functions: Nothing", "code": "#include <unistd.h>\n\n[[void]]\tft_ft([[int]] *nbr)\n{\n    *nbr = [[42]];\n}"}, {"name": "ex01", "readme": "## Exercise 01: ft_ultimate_ft\n+ Create a function that takes a pointer to pointer to pointer to pointer to pointer to pointer to pointer to pointer to pointer to int as a parameter and sets the value \"42\" to that int.\n+ Here's how it should be prototyped:\n```C\nvoid\tft_ultimate_ft(int *********nbr);\n```\n+ Files to turn in: ft_ultimate_ft.c\n+ Allowed functions: Nothing", "code": "#include <unistd.h>\n\n[[void]]    ft_putchar(char c)\n{\n    write(1, &c, 1);\n}\n\nvoid    ft_putnbr([[int]] n)\n{\n    if (n < 0)\n    {\n        ft_putchar('-');\n        n = -n;\n    }\n    if (n > 9)\n    {\n        ft_putnbr(n / 10);\n    }\n    ft_putchar((n % 10) + '0');\n}\n\nvoid    ft_ultimate_ft(int *********nbr)\n{\n    *********nbr = 42;\n}\n\nint    main(void)\n{\n    int    number;\n    int    *p;\n    int    **p2;\n    int    ***p3;\n    int    ****p4;\n    int    *****p5;\n    int    ******p6;\n    int    *******p7;\n    int    ********p8;\n    int    *********p9;\n    \n    p = &number;\n    p2 = &p;\n    p3 = &p2;\n    p4 = &p3;\n    p5 = &p4;\n    p6 = &p5;\n    p7 = &p6;\n    p8 = &p7;\n    p9 = &p8;\n    \n    number = 1337;\n    ft_ultimate_ft(p9);\n    ft_putchar('\\n');\n    [[return]] (0);\n}"}, {"name": "ex02", "readme": "## Exercise 02: ft_swap\n+ Create a function that swaps the value of two integers whose addresses are entered as parameters.\n+ Here\u2019s how it should be prototyped:\n```C\nvoid\tft_swap(int *a, int *b);\n```\n+ Files to turn in: ft_swap.c\n+ Allowed functions: Nothing", "code": "#include <unistd.h>\n\n[[void]]    ft_putchar(char c)\n{\n    write(1, &c, 1);\n}\n\nvoid    ft_putnbr([[int]] nbr)\n{\n    if (nbr < 0)\n    {\n        ft_putchar('-');\n        nbr = -nbr;   \n    }\n    if (nbr > 9)\n    {\n        ft_putnbr(nbr / 10);\n    }\n    ft_putchar(nbr % 10 + '0');\n    \n}\n\nvoid\tft_swap(int *a, int *b)\n{\n    int tmp;\n\n    tmp = *a;\n    *a = *b;\n    *b = tmp;\n\n}\n\nint main(int i, int j)\n{\n\n    i = 69;\n    j = 2001;\n\n    ft_putnbr(i);\n\tft_putchar(',');\n\tft_putchar(' ');\n\tft_putnbr(j);\n\tft_putchar('\\n');\n\n\tft_swap(&i, &j);\n\n\tft_putnbr(i);\n\tft_putchar(',');\n\tft_putchar(' ');\n\tft_putnbr(j);\n\tft_putchar('\\n');\n\n    [[return]] 0;\n}\n"}, {"name": "ex03", "readme": "## Exercise 03: ft_div_mod\n+ Create a function **ft_div_mod** prototyped like this:\n```C\nvoid\tft_div_mod(int a, int b, int *div, int *mod);\n```\n+ This function divides parameters a by b and stores the result in the int pointed by div. It also stores the remainder of the division of a by b in the int pointed by mod.\n+ Files to turn in: ft_div_mod.c\n+ Allowed functions: Nothing", "code": "#include <unistd.h>\n\n[[void]]    ft_putchar(char c)\n{\n    write(1, &c, 1);\n}\n\nvoid ft_print_numbers([[int]] n)\n{\n\tif (n >= 10)\n\t\tft_print_numbers(n / 10);\n\tft_putchar((n % 10) + '0');\n}\n\nvoid\tft_div_mod(int a, int b, int *div, int *mod)\n{\n    if (b != 0)\n    {\n    *div = a /  b;\n    *mod = a % b;\n    }\n}\n\nint main(){\n    \n    int a = 40;\n    int b = 5;\n    int x;\n    int y;\n\n    ft_div_mod(a, b, &x, &y);\n\n\n    ft_putchar('a');\n    ft_putchar(' ');\n    ft_print_numbers(a);\n    \n    ft_putchar('\\n');\n\n    ft_putchar('b');\n    ft_putchar(' ');\n    ft_print_numbers(b);\n\n    ft_putchar('\\n');\n\n    ft_putchar('x');\n    ft_putchar(' ');\n    ft_print_numbers(x);\n \n    ft_putchar('\\n');\n\n    ft_putchar('y');\n    ft_putchar(' ');\n    ft_print_numbers(y);\n\n\n    [[return]] 0;\n}"}, {"name": "ex04", "readme": "## Exercise 04: ft_ultimate_div_mod\n+ Create a function **ft_ultimate_div_mod** with the following prototype:\n```C\nvoid\tft_ultimate_div_mod(int *a, int *b);\n```\n+ This function divides parameters a by b. The result of this division is stored in the int pointed by a. The remainder of the division is stored in the int pointed by b.\n+ Files to turn in: ft_ultimate_div_mod.c\n+ Allowed functions: Nothing", "code": "#include <unistd.h>\n\n[[void]]    ft_putchar(char c)\n{\n    write(1, &c, 1);\n}\n\nvoid    ft_print_numbers([[int]] n)\n{\n    if (n >= 10)\n        ft_print_numbers(n / 10);\n    ft_putchar((n % 10) + '0');\n}\n\nvoid\tft_ultimate_div_mod(int *a, int *b)\n{\n    int tmp;\n\n    tmp = *a / *b;\n    *b = *a % *b;\n    *a = tmp;\n}\n\nint main()\n{\n\n    int a = 12;\n    int b = 6;\n    int *pa = &a;\n    int *pb = &b;\n    \n    ft_ultimate_div_mod(pa, pb);\n\n    ft_putchar('a');\n    ft_putchar(' ');\n    ft_putchar(a + 48);\n\n    ft_putchar('\\n');\n\n    ft_putchar('b');\n    ft_putchar(' ');\n    ft_putchar(b + 48);\n\n    ft_putchar('\\n');\n\n\n    [[return]] 0;\n}\n"}, {"name": "ex05", "readme": "## Exercise 05: ft_putstr\n+ Create a function that display a string of characters on the standard output.\n+ Here's how it should be prototyped:\n```C\nvoid\tft_putstr(char *str);\n```\n+ Files to turn in: ft_putstr.c\n+ Allowed functions: ft_putchar", "code": "#include <unistd.h>\n\nvoid    ft_putchar(char c)\n{\n    write(1, &c, 1);\n}\n\nvoid\tft_putstr(char *str)\n{\n    [[int]] i;\n\n    i = 0;\n    [[while]] (str[i] != '\\0')\n    {\n        write(1, &str[i], 1);\n        i++;\n    }\n}\n\nint main()\n{\n    char *c;\n    c = \"karim\";\n    ft_putstr(c);\n\n    [[return]] 0;\n}"}, {"name": "ex06", "readme": "## Exercise 06: ft_strlen\n+ Create a function that counts and returns the number of characters in a string.\n+ Here's how it should be prototyped:\n```C\nint\tft_strlen(char *str);\n```\n+ Files to turn in: ft_strlen.c\n+ Allowed functions: Nothing", "code": "#include <unistd.h>\n\nvoid    ft_putchar(char c)\n{\n    write(1, &c, 1);\n}\n\nvoid    ft_print_numbers([[int]] i)\n{\n    if (i >= 10)\n        ft_print_numbers(i / 10);\n    ft_putchar((i % 10) + '0');\n\n}\n\nint\tft_strlen(char *str)\n{\n    int i;\n\n    i = 0;\n\n    [[while]] (str[i] != '\\0')\n    {\n        i++;\n    }\n    [[return]] (i);\n}\n\nint main()\n{\n    // Declare a pointer to a string literal \"karim\"\n    char *c = \"younes\";\n\n    // Call ft_strlen with the string and store the result in the variable length\n    int length = ft_strlen(c);\n\n    // Declare a character array to store the string representation of the length\n    char len_str[16];\n\n    // Initialize an index variable to 0\n    int i = 0;\n\n    // Convert the length to a string representation using a loop that extracts the last digit and adds it to the array\n    while (length > 0)\n    {\n        len_str[i++] = (length % 10) + '0';\n        length /= 10;\n    }\n\n    // Print the string representation of the length in reverse order using a loop\n    while (--i >= 0)\n    {\n        ft_putchar(len_str[i]);\n    }\n\n    // Print a newline character to separate the outputs\n    ft_putchar('\\n');\n\n\n    // End the program by returning 0 to indicate success\n    return 0;\n}"}, {"name": "ex07", "readme": "## Exercise 07:\n### ft_rev_int_tab\n\n+ Create a function which reverses a given array of integers (first goes last, etc).\n+ The arguments are a pointer to int and the number of ints in the array.\n+ Here's how it should be prototyped:\n```C\nvoid\tft_rev_int_tab(int *tab, int size);\n```\n+ Files to turn in: ft_rev_int_tab.c\n+ Allowed functions: None\n\n+ Example:\n```\n\ta     => a\n\tab    => ba\n\tabcde => edcba\n```", "code": "#include <unistd.h>\n\nvoid    ft_putchar(char c)\n{\n    write(1, &c, 1);\n}\n\n\nvoid\tft_rev_int_tab([[int]] *tab, int size)\n{\n    int first;\n    int last;\n    int tmp;\n\n    first = 0;\n    last = size - 1;\n\n    [[while]] (first < last)\n    {\n        tmp = tab[first];\n        tab[first] = tab[last];\n        tab[last] = tmp;\n        first++;\n        last--;\n    }\n    \n}\n\nint main(int i)\n{\n    int arr[5] = {1,2,3,4,5};\n\n    ft_rev_int_tab(arr, 5);\n\n    for(i = 0; i < 5; i++)\n    {\n        ft_putchar(arr[i] + '0');\n    }\n\n    [[return]] 0;\n}"}, {"name": "ex08", "readme": "## Exercise 08: ft_sort_int_tab\n+ Create a function which sorts an array (table) of integers by ascending order.\n+ The arguments are a pointer to int and the number of ints in the array.\n+ Here's how it should be prototyped:\n```C\nvoid\tft_sort_int_tab(int *tab, int size);\n```\n+ Files to turn in: ft_sort_int_tab.c\n+ Allowed functions: Nothing", "code": "#include <unistd.h>\n\n\n[[void]]\tft_sort_int_tab([[int]] *tab, int size)\n{\n\tint\ti;\n\tint\tswap;\n\n\t[[while]] (size >= 0)\n\t{\n\t\ti = 0;\n\t\twhile (i < size - 1)\n\t\t{\n\t\t\tif (tab[i] > tab[i + 1])\n\t\t\t{\n\t\t\t\tswap = tab [i];\n\t\t\t\ttab[i] = tab [i + 1];\n\t\t\t\ttab [i + 1] = swap;\n\t\t\t}\n\t\t\ti++;\n\t\t}\n\t\tsize--;\n\t}\n}"}]}, {"day": "C02", "exercises": [{"name": "ex00", "readme": "## Exercise 03: ft_strcpy\n\n- Reproduce the behavior of the function __strcpy__ (man strcpy).\n- Here's how it should be prototyped:\n```C\n   char\t\t*ft_strcpy(char *dest, char *src);\n```\n\n## Understanding strcpy\nSyntax: char \\*strcpy (char \\*destination, const char \\*source);\\\n\nThe strcpy() function is used to copy strings. It copies string pointed to by source into the destination. This function accepts two arguments of type pointer to char or array of characters and returns a pointer to the first string i.e destination. Notice that source is preceded by the const modifier because strcpy() function is not allowed to change the source string.\n\nIt is important to note that strcpy() function do not check whether the destination has enough size to store all the characters present in the source. It is the responsibility of the program to make sure that the destination array has enough space to accommodate all the characters of the source string.\n\nAnother important point to note about strcpy() is that you should never pass string literals as a first argument. For example:\n\n```C\nchar ch_arr[] = \"string array\";\n\nstrcpy(\"destination string\", c_arr); // wrong\n```\n\nHere you are trying to copy the contents of ch_arr to \"destination string\" which is a string literal. Since modifying a string literal causes undefined behaviour, calling strcpy() in this way may cause the program to crash.", "code": "#include <unistd.h>\n\nchar\t\t*ft_strcpy(char *dest, char *src)\n{\n        [[int]] i;\n\n        i = 0;\n\n        [[while]](src[i])\n        {\n            dest[i] = src[i];\n            i++;\n        }\n        dest[i] = '\\0';\n        [[return]](dest);\n}"}, {"name": "ex01", "readme": "## Exercise 04: ft_strncpy\n\n- Reproduce the behavior of the function __strncpy__ (man strncpy).\n- Here's how it should be prototyped:\n```C\n\tchar\t*ft_strncpy(char *dest, char *src, unsigned int n);\n```\n\n## Understanding strncpy\n### Description:\nThe stpncpy() and strncpy() functions copy at most len characters\nfrom src into dst.  If src is less than len characters long, the\nremainder of dst is filled with `\\0' characters.  Otherwise, dst is\nnot terminated.\n\n### Return Values\nThe strcpy() and strncpy() functions return dst.  The stpcpy() and\nstpncpy() functions return a pointer to the terminating `\\0' character of dst.  If stpncpy() does not terminate dst with a NUL character, it instead returns a pointer to dst[n] \\(which does not necessarily refer to a valid memory location.)\n\n### Examples\n- The following sets chararray to ''abc\\0\\0\\0'':\n\n```C\n           char chararray[6];\n\n           (void)strncpy(chararray, \"abc\", sizeof(chararray));\n```\n\n- The following sets chararray to ''abcdef'':\n\n```C\n           char chararray[6];\n\n           (void)strncpy(chararray, \"abcdefgh\", sizeof(chararray));\n```\n\nNote that it does not NUL terminate chararray because the length ofthe source string is greater than or equal to the length argument.\n\n- The following copies as many characters from input to buf as will\nfit and NUL terminates the result.  Because strncpy() does not guarantee to NUL terminate the string itself, this must be done explicitly.\n\n```C\n           char buf[1024];\n\n           (void)strncpy(buf, input, sizeof(buf) - 1);\n           buf[sizeof(buf) - 1] = '\\0';\n```\n\nThis could be better achieved using strlcpy(3), as shown in the following example:\n\n```C\n           (void)strlcpy(buf, input, sizeof(buf));\n```\n\nNote that because strlcpy(3) is not defined in any standards, it should only be used when portability is not a concern.", "code": "#include <unistd.h>\n\nchar\t*ft_strncpy(char *dest, char *src, unsigned [[int]] n)\n{\n    unsigned int i;\n\n    i = 0;\n    \n    [[while]](src[i] && i < n)\n    {\n        dest[i] = src[i];\n    }\n    while(i < n)\n    {\n        dest[i] = '\\0';\n        i++;\n    }\n    [[return]](dest);\n}"}, {"name": "ex02", "readme": "## Exercise 11: ft_str_is_alpha\n- Create a function that returns 1 if the string given as a parameter contains only alphabetical characters, and 0 if it contains any other character.\n- Here's how it should be prototyped:\n```C\n\tint\tft_str_is_alpha(char *str);\n```\n- It should return 1 if __str__ is empty.\n", "code": "#include <unistd.h>\n#include <stdio.h>\n\n[[int]]\tft_str_is_alpha(char *str)\n{\n\tint\ti;\n\n\ti = 0;\n\tif (str[i] == '\\0' )\n\t{\n\t\t[[return]] (1);\n\t}\n\t[[while]] (str[i] != '\\0')\n\t{\n\t\tif ((str[i] >= 'A' && str [i] <= 'Z') || (str [i] >= 'a' && str [i] <= 'z'))\n\t\t\ti++;\n\t\telse\n\t\t\treturn (0);\n\t}\t\n\treturn (1);\n}\nint\tmain()\n{\n\tprintf(\"%d\", ft_str_is_alpha(\"abcdefghijkl\"));\n\tprintf(\"\\n%d\", ft_str_is_alpha(\"abc1defghijkl\"));\n\tprintf(\"\\n%d\", ft_str_is_alpha(\"-_134556efghij67\"));\n}\n"}, {"name": "ex03", "readme": "## Exercise 12: ft_str_is_numeric\n- Create a function that returns 1 if the string given as a parameter contains only digits, and 0 if it contains any other character.\n- Here's how it should be prototyped:\n```C\n\tint\tft_str_is_numeric(char *str);\n```\n- It should return 1 if __str__ is empty.\n", "code": "#include <unistd.h>\n#include <stdio.h>\n\n\n[[int]]\tft_str_is_numeric(char *str)\n{\n    int i;\n\n    i = 0;\n\n    [[while]](str[i])\n    {\n        if (str[i] >= '0' && str[i] <= '9')\n            i++;\n        else\n            [[return]] (0);\n    }\n    return (1);\n}\n\nint\tmain()\n{\n\tprintf(\"%d\", ft_str_is_numeric(\"01948987493\"));\n\tprintf(\"\\n%d\", ft_str_is_numeric(\"0484882j8995489\"));\n\tprintf(\"\\n%d\", ft_str_is_numeric(\"-_jsdsdc67sdlkc,\"));\n}"}, {"name": "ex04", "readme": "## Exercise 13: ft_str_is_lowercase\n- Create a function that returns 1 if the string given as a parameter contains only lowercase alphabetical characters, and 0 if it contains any other character.\n- Here's how it should be prototyped:\n```C\n\tint\tft_str_is_lowercase(char *str);\n```\n- It should return 1 if __str__ is empty.\n", "code": "#include <unistd.h>\n\n[[int]]\tft_str_is_lowercase(char *str)\n{\n    int i;\n\n    i = 0;\n\n    [[while]](str[i])\n    {\n       if (str[i] >= 'a' && str[i] <= 'z')\n              i++;\n       else\n            [[return]](0);\n    }\n    return(1);\n}\n\nint\tmain()\n{\n\tprintf(\"%d\", ft_str_is_lowercase(\"abcdefghijkl\"));\n        printf(\"\\n%d\", ft_str_is_lowercase(\"abcAdefghijkl\"));\n        printf(\"\\n%d\", ft_str_is_lowercase(\"-_134556efSghij67\"));\n}"}, {"name": "ex05", "readme": "## Exercise 14: ft_str_is_uppercase\n- Create a function that returns 1 if the string given as a parameter contains only uppercase alphabetical characters, and 0 if it contains any other characters.\n- Here's how it should be prototyped:\n```C\n\tint\tft_str_is_uppercase(char *str);\n```\n- It should return 1 if __str__ is empty.", "code": "#include <unistd.h>\n#include <stdio.h>\n\n[[int]]\tft_str_is_uppercase(char *str)\n{\n    int i;\n\n    i = 0;\n\n    [[while]](str[i])\n    {\n        if (str[i] >= 'A' && str[i] <= 'Z')\n            i++;\n        else\n            [[return]](0);\n    }\n    return(1);\n}\n\nint\tmain()\n{\n\tprintf(\"%d\", ft_str_is_uppercase(\"ABdDCDEE\"));\n        printf(\"\\n%d\", ft_str_is_uppercase(\"abcAdefghijkl\"));\n        printf(\"\\n%d\", ft_str_is_uppercase(\"-_134556efSghij67\"));\n}"}, {"name": "ex06", "readme": "## Exercise 15: ft_str_is_printable\n- Create a function that returns 1 if the string given as a parameter contains only printable characters, and 0 if it contains any other character.\n- Here's how it should be prototyped:\n```C\n\tint\tft_str_is_printable(char *str);\n```\n- It should return 1 if __str__ is empty.\n", "code": "#include <unistd.h>\n\n[[int]]\tft_str_is_printable(char *str)\n{\n    int i;\n\n    i = 0;\n\n    [[while]](str[i])\n    {\n        if (str[i] >= 31 && str[i] <= 126)\n            i++;\n        else\n            [[return]](0);\n    }\n    return(1);\n}\n\nint\tmain()\n{\n\tprintf(\"%d\", ft_str_is_printable(\"ABdDCDEE\"));\n    printf(\"\\n%d\", ft_str_is_printable(\"abcAdefghijkl\"));\n    printf(\"\\n%d\", ft_str_is_printable(\"-_134556efSghij67\"));\n}"}, {"name": "ex07", "readme": "## Exercise 08: ft_strupcase\n- Create a function that transforms every letter of every word to uppercase.\n- Here's how it should be prototyped: \n```C\n\tchar\t*ft_strupcase(char *str)\n```\n- It should return __str__.", "code": "#include <unistd.h>\n\nchar\t*ft_strupcase(char *str)\n{\n    [[int]] i;\n\n    i = 0;\n\n    [[while]](str[i])\n    {\n        if (str[i] >= 'a' && str[i] <= 'z')\n        str[i] = str[i] - 32;\n        i++;\n    }\n    [[return]](str);\n}"}, {"name": "ex08", "readme": "## Exercise 09: ft_strlowcase\n- Create a function that transforms every letter of every word to lowercase.\n- Here's how it should be prototyped:\n```C\n\tchar\t*ft_strlowcase(char *str);\n```\n- It should return **str**.", "code": "#include <unistd.h>\n\nchar\t*ft_strlowcase(char *str)\n{\n    [[int]] i;\n\n    i = 0;\n\n    [[while]](str[i])\n    {\n        if (str[i] >= 'A' && str[i] <= 'Z')\n            str[i] = str[i] + 32;\n            i++;\n    }\n    [[return]](str);\n}\n"}, {"name": "ex09", "readme": "## Exercise 10: ft_strcapitalize\n- Create a function that capitalize the first letter of each word and transforms all other letter to lowercase.\n- A word is a string of alphanumeric characters.\n- Here's how it should be prototyped:\n```C\n\tchar\t*ft_strcapitalize(char *str);\n```\n- It should return __str__.\n- For example:\n> salut, comment tu vas ? 1337mots quanate-deux; cinquante+et+un\n- Becomes:\n> Salut, Comment Tu Vas ? 1337mots Quarante-Deux; Cinuante+Et+Un", "code": "#include <unistd.h>\n#include <stdio.h>\n\nchar\t*ft_strlowcase(char *str)\n{\n\t[[int]]\ti;\n\n\ti = 0;\n\t[[while]] (str[i])\n\t{\n\t\tif (str[i] >= 65 && str[i] <= 90)\n\t\t{\n\t\t\tstr[i] += 32;\n\t\t}\n\t\ti++;\n\t}\n\t[[return]] (str);\n}\n\nchar\t*ft_strcapitalize(char *str)\n{\n\tint\ti;\n\tint\tx;\n\n\ti = 0;\n\tx = 1;\n\tft_strlowcase(str);\n\twhile (str[i])\n\t{\n\t\tif (str[i] >= 97 && str[i] <= 122)\n\t\t{\n\t\t\tif (x == 1)\n\t\t\t\tstr[i] -= 32;\n\t\t\tx = 0;\n\t\t}\n\t\telse if (str[i] >= '0' && str[i] <= '9')\n\t\t\tx = 0;\n\t\telse\n\t\t\tx = 1;\n\t\ti++;\n\t}\n\treturn (str);\n}"}, {"name": "ex10", "readme": "## Exercise 10: ft_strlcpy\n- Reproduce the behavior of the function strlcpy (man strlcpy).\n- Here's how it should be prototyped:\n```C\n\tunsigned inft_strlcpyt\t(char *dest, char *src, unsigned int size);\n```\n## Understanding strlcpy\n### Description:\n- The strlcpy() and strlcat() functions copy and concatenate strings with the same input parameters and output result as snprintf(3).  They are designed to be safer, more consistent, and less error prone replacements for the easily misused functions strncpy(3) and strncat(3). strlcpy() and strlcat() take the full size of the destination buffer and guarantee NUL-termination if there is room.  Note that room for the NUL should be included in dstsize. strlcpy() copies up to dstsize - 1 characters from the string src to dst, NUL-terminating the result if dstsize is not 0.\n\n- The strcpy() function copies string s2 to s1, including the terminating null character, stopping after the null character has been copied. The strncpy() function copies exactly n bytes, truncating s2 or adding null characters to s1 if necessary. The result will not be null-terminated if the length of s2 is n or more. Each function returns s1. If copying takes place between objects that overlap, the behavior of strcpy(), strncpy(), and strlcpy() is undefined.\\\nThe strlcpy() function copies at most dstsize\u22121 characters (dstsize being the size of the string buffer dst) from src to dst, truncating src if necessary. The result is always null-terminated. The function returns strlen(src). Buffer overflow can be checked as follows:\n```C\nif (strlcpy(dst, src, dstsize) >= dstsize)\n        return \u22121;\n```\n", "code": "#include <unistd.h>\n#include <stdio.h>\n\nunsigned [[int]]\tft_strlcpy(char *dest, char *src, unsigned int size)\n{\n    unsigned int len_src;\n    unsigned int i;\n\n    len_src = 0;\n    i = 0;\n\n    [[while]] (src[i])\n    {\n        len_src++;\n        i++;\n    }\n    if (size == 0)\n        [[return]] (len_src);\n    i = 0;\n    while (src[i] && i < size - 1)\n    {\n        dest[i] = src[i];\n        i++;\n    }\n    dest[i] = '\\0';\n    return (len_src);\n}"}, {"name": "ex11", "readme": "## Exercise 22: ft_putstr_non_printable\n- Create a function that displays a string of characters onscreen. If this string contains characters that aren't printable, they'll have to be displayed in the shape of hexadecimals (lowercase), preceded by a \"backslash\".\n- For example:\n> Coucou\\ntu vas bien ?\n- The function should display:\n> Coucou\\0atu vas bien ?\n- Here's how it should be prototyped:\n```C\n\tvoid\tft_putstr_non_printable(char *str);\n```\n\nTODO:\n1. scan text for none printable character.\n2. get the integer value of the particular character.\n3. convert the value to hex. (and from int to str)\n4. replace the non-printable character with the converted value.\\\n\tinsert the converted hex string in the index of the non printable character \n\nnote:\n- we need a function to convert integer to a null terminated string. (including negative).\n\n\n## IMPORTANT:\nthat's why you always need to understand the exercise the right way.\\\nbecause the simplest steps are:\\\n1. for every character in the given string print it if it's printable\n2. if not then print the hex value of it after printing \\\\0.", "code": "#include <unistd.h>\n\nvoid\tft_putchar(char c)\n{\n\twrite(1, &c, 1);\n}\n\n[[int]]\tft_char_is_printable(char c)\n{\n\tif (c >= 32 && c <= 126)\n\t\t[[return]] (1);\n\telse\n\t\treturn (0);\n}\n\nvoid\tft_putstr_non_printable(char *str)\n{\n\tint\ti;\n\n\ti = 0;\n\t[[while]] (str[i] != '\\0')\n\t{\n\t\tif (ft_char_is_printable(str[i]) == 1)\n\t\t\tft_putchar(str[i]);\n\t\telse\n\t\t{\n\t\t\tft_putchar('\\\\');\n\t\t\tft_putchar(\"0123456789abcdef\"[str[i] / 16]);\n\t\t\tft_putchar(\"0123456789abcdef\"[str[i] % 16]);\n\t\t}\n\t\ti++;\n\t}\n}"}, {"name": "ex12", "readme": "# Exercise:\n* Create a function that displays the memory area on screen.\n* The display of this memory area should be split into three columns:\n\t* The hexadecimal address of the first line's first character;\n\t* The content in hexadecimal;\n\t* The content in printable characters.\n* If characters is non-printable, it'll be replaced by a dot.\n* Each line should handle sixteen characters.\n* If size equal to 0, nothing should be displayed.\n* It should return addr;\n\n* Here how it should be prototyped:\n```C\n\tvoid\t*ft_print_memory(void *addr, unsigned int size);\n```\n\n## Example:\n```\nguilla_i@seattle $> ./ft_print_memory\n00000000: 5361 6c75 7420 6c65 7320 616d 696e 6368  Salut les aminch \n00000010: 6573 2063 2765 7374 2063 6f6f 6c20 7368  es c'est cool sh\n00000020: 6f77 206d 656d 206f 6e20 6661 6974 2064  ow mem on fait d \n00000030: 6520 7472 7563 2074 6572 7269 626c 6500  e truc terrible.\n00000040: 2e00 0102 0304 0506 0708 090e 0f1b 7f    ...............\nguilla_i@seattle $> ./ft_print_memory | cat -te\n00000000: 5361 6c75 7420 6c65 7320 616d 696e 6368  Salut les aminch$\n00000010: 6573 2063 2765 7374 2063 6f6f 6c20 7368  es c'est cool sh$ \n00000020: 6f77 206d 656d 206f 6e20 6661 6974 2064  ow mem on fait d$\n00000030: 6520 7472 7563 2074 6572 7269 626c 6500  e truc terrible.$\n00000040: 2e00 0102 0304 0506 0708 090e 0f1b 7f    ...............$\nguilla_i@seattle $>\n```\n\n\n# Solution\n\n* First we divide the problem into smaller problems and for out case\\\n  since we expect the output to be divided by 3 columns we create:\n\t* A put_addr function to print the byte of the first character;\n\t* A put_hex function to print the content in hexadecimal;\n\t* A put_str function to print the content in printable characters;\n* We call the 3 function inside the print_memory function;\n\n###  put_addr\n1. **put_addr**: this function is a bit tricky even though it appears simple\n   the idea is to print the address of the first character in the that\\\n   particular row int hexadecimal.\\\n   ex: considering the string \"Future is loading!\" of size 18\\\n   the put_addr function sould give the address of the first byte;\\\n   which is: 00000000;\n\n   but we don't need to take the given string in order to print the addr\\\n   of the first character of each 16 bytes;\\\n   rather it is better to receive the index of the target byte from\\\n   the ft_print_memory function and print the addr of the target byte\\\n   in hex;\n\n   **note**:\n   Each hexadecimal digit represents four bits (binary digits), also known\\\n   as a nibble (or nybble), which is half a byte. For example, a single byte\\\n   can have values ranging from 00000000 to 11111111 in binary form, which\\\n   can be conveniently represented as 00 to FF in hexadecimal.\n\n\t* First declare the (char \\*) variable to hold a string from 0 to f\n\tthat represent hexadecimal.\n\t* then we declare a (static int) variable (check) to keep track of\n\tif the given number is checked or not\\\n\t* Now to the step of checking, knowing that we expect the address\\\n\tto be shown as\\\n\ta string of size 8 (00000000)\\\n\tconsidering:\\\n\t\t```\n\t\t15\t\t= 0xf\t\t= we add 7 of '0'\n\t\t255\t\t= 0xff\t\t= we add 6 of '0'\n\t\t4095\t\t= 0xfff\t\t= we add 5 of '0'\n\t\t65535\t\t= 0xffff\t= we add 4 of '0'\n\t\t1048575\t= 0xfffff\t= we add 3 of '0'\n\t\t16777215\t= 0xffffff\t= we add 2 of '0'\n\t\t268435455\t= 0xfffffff\t= we add 1 of '0'\n\t\t```\n\t* (not that we need to check if nbr == 0 to add another '0')\\\n \tso the checking step is to check if a number >= one of these number\\\n\tto add the right numbers or 0's before it\n\t* and because the put_addr function calls itself recursivly\\\n\tthe check step gonna be repeated and we'll get lot of 0's int our\\\n\toutput. that's why we declared the (static int) function.\\\n\twe first see if the we already checked the given number, if not\\\n\twe check it then assign 1 to checked varaible.\n\t* Then we check if nbr >= 16, if true we call put_add(nbr / 16)\\\n\tsame process as in the previous ft_putnbr but with base 16 because\\\n\twe are dealing with hexadecimal.\n\t* Finally we print hexadecimal of the number with\\\n\t\tft_putchar(base[nbr % 16])\\\n\tconsiderng base = \"0123456789abcdef\"\\\n\tafter finish we set the value of (checked to 0) so we can be able\\\n\tto check the nbr in the next function call.\n\n### put_hex\n2. **put_hex**: this function prints 16 bytes of the given string\\\n\tconverted to hex, it takes 2 arguments, the first is the (char *)\n\tfrom the print_memory function, and the second is the index\\\n\tfrom where to start printing the hex.\\\n\t* First we declare (char \\*) to string from '0' to 'a' representing\\\n\tthe hexadicemal values.\n\t* We declare an int variable (byte) to keep track of how many bytes\\\n\twe printed, because the goal is to print exactly 16 byte each time\\\n\tthe function is called.\n\t* We start a while loop, while byte < 16 we keep iterating through\\\n\tcharacter of the giving string converting and printing each character\\\n\tnote: add a conditional statment to handle the space in every 2 bytes\\\n\t(if bytes % 2 == 0) print space\n\t* And finally when the byte count reaches 16 we exit the loop & and\\\n\tfunction.\n\n### put_str\n3. **put_str**: this function is the simplest one, the goal is to print the\\\n\tcontent in printable characters (execluding space).\\\n\tthis funciton takes 3 arguments, the string, the current index\\\n\tand the size of the string.\\\n\t* First we declare a variable (done) to keep track of the end of\\\n\tthe given string. The idea behind this variable is that we don't\n\twant the function to stop even when we reach the end of the string\\\n\tbecause we want to print exactly 16 bytes\\\n\ttherefore when the end of string is reached the value of done = 1\\\n\tand we let the function to finish the last 16 bytes then we return\n\tthe size to the print_memory function to break from the loop and\\\n\tend the program.\n\t* we declare byte to keep track of how many character we printed so far\\\n\t* we start a while loop to iterate through each character from the\\\n\tgiven string and printing each printable character including space\\\n\tand we check if we reached the end of the string along the way\n\t* Lastly we check if we reached the end of the string\\\n\tif true we return the size of the given string to let the outer\\\n\tfunction know that it needs to end the program.\n\t* And finally if done is not true and we still didn't reach the\\\n\tend of the string, we return the number of bytes we printed (ofc 16)\n\n## ft_print_memory\n\n0. And finally since we're done praparing the the needed functions, now we just\\\nhave to put them together.\\\n\t* We declare a (char *) variable to hold the given string\\\n\tor more currently to hold the pointer to first element of the given\\\n\tarray of characters terminated by the null character (aka string)\\\n\tand because the we spicified in the parameter the the given argument\\\n\tneed to be of type void, we need to cast it to (converting it to (char *))\n\t* We decare and index variable to keep track of how many iteration\\\n\twe made so far.\n\t* Now we start a while loop checking if the index if less than the\\\n\tsize of the given string.\\\n\tif true we iterate through the loop\n\t\t1. Printing the address with put_addr\n\t\t2. Adding ':' after each time the function put_addr is called.\n\t\t3. Printing the content in hex with (put_hex).\n\t\t4. Adding two spalces.\n\t\t5. Now we print the final row with put_str, which is the\n\t\tcontent in printable characters excluding spalce. we pass\\\n\t\tthe string and the size of the string, and also the current index.\n\t\t6. We add the return value of put_str to the current value of\\\n\t\tindex, and if the function reaches the end of the given strinG\\\n\t\twe add it to the value of index and therefore index now is\\\n\t\tgreater than the size of the given string.\n\t\t7. We exit the loop  and return addr.\n\n\t\n\t", "code": "#include <stdio.h>\n\n[[int]]\tputstr(char *str, int index, int size);\nvoid\tputhex(char *str, int index);\nvoid\tputaddr(int nbr);\nvoid\t*ft_print_memory(void *addr, unsigned int size);\n\nint\tmain(void)\n{\n\tchar\t*str = \"\\nThe Piscine is an intensive, full-time, 4-week long immersion on the 1337 campus with other eligible candidates like yourself. During this month, we will test your motivation to become a world-class programmer, find out if you are #BornToCode and if you can excel in our peer-to-peer learning environment. The Piscine requires your full-time commitment.\\n\\nThe Piscine is the only way to become a student at 1337 and be fully admitted to the course.\\n\\nYou need to choose one of the Piscine dates below or register on the waiting list if they are fully booked.\";\n\n\tft_print_memory(str, 116);\n\t[[return]] (0);\n}\n\nvoid\t*ft_print_memory(void *addr, unsigned int size)\n{\n\tchar\t*str;\n\tunsigned int\ti;\n\n\tstr = (char *) addr;\n\ti = 0;\n\t[[while]](i < size)\n\t{\n\t\tputaddr(i);\t\n\t\tputchar(':');\n\n\t\tputhex(str, i);\n\t\tputchar(' ');\n\t\tputchar(' ');\n\n\t\ti += putstr(str, i, size);\n\t\tputchar('\\n');\n\t}\n\treturn (addr);\n}\n\nvoid\tputaddr(int nbr)\n{\n\tstatic\tint checked;\n\tchar\t*base = \"0123456789abcdef\";\n\tint\tnbase;\n\tint\ti;\n\tint\tlen;\n\n\tlen = 1;\n\ti = nbr;\n\tnbase = 16;\n\twhile ((i /= 16) && !checked)\n\t\tlen++;\n\ti = 0;\n\tif (!checked)\n\t{\n\t\tchecked = 1;\n\t\twhile (i++ < (8 - len))\n\t\t\tputchar('0');\n\t}\n\tif (nbr >= nbase)\n\t\tputaddr(nbr / nbase);\n\tputchar(base[nbr % nbase]);\n\tchecked = 0;\n}\n\nvoid     puthex(char *str, int index)\n{\n\tchar\t*hex = \"0123456789abcdef\";\n\n\tint\tbyte = 0;\n\twhile (byte < 16)\n\t{\n\t\tif (byte % 2 == 0)\n\t\t\tputchar(' ');\n\t\tif (str[byte] > 16)\n\t\t{\n\t\t\tputchar(hex[str[byte + index] / 16]);\n\t\t\tputchar(hex[str[byte + index] % 16]);\t\n\t\t}\n\t\telse\n\t\t{\n\t\t\tputchar('0');\n\t\t\tputchar(hex[str[byte + index] % 16]);\n\t\t}\n\t\tbyte++;\n\t}\n}\n\nint\tputstr(char *str, int index, int size)\n{\n\tint\tdone;\n\tint\tbyte;\n\tint\ti;\n\n\tbyte = 0;\n\tdone = 0;\n\twhile (byte < 16)\n\t{\n\t\ti = index + byte;\n\t\tif (str[i] == '\\0')\n\t\t\tdone = 1;\n\t\tif ((str[i] >= '!' && str[i] <= '~') || str[i] == ' ')\n\t\t\tputchar(str[i]);\n\t\telse\n\t\t\tputchar('.');\n\t\tbyte++;\n\t}\n\tif (done)\n\t\treturn (size);\n\treturn (byte);\n}\n"}]}, {"day": "C03", "exercises": [{"name": "ex00", "readme": "## Exercise 06: ft_strcmp\n- Reproduce the behavior of the function strcmp (man strcmp).\n- Here's how it should be prototyped:\n```C\n\tint\tft_strcmp(char *s1, char *s2);\n```\n\n## Understanding strcmp\n\n### Description\nThe strcmp() function is used to compare two strings two strings str1 and str2. If two strings are same then strcmp() returns 0, otherwise, it returns a non-zero value.\n\n### Return values\nThe strcmp() and strncmp() functions return an integer greater than, equal to, or less than 0, according as the string s1 is greater than, equal to, or less than the string s2.  The comparison is done using unsigned characters, so that `\\200' is greater than `\\0'.\n\n| Value | Meaning |\n|---|----|\n| < 0| str1 < str2\n| 0|str1 == str2\n| > 0  | str1 > str2\n\n### More\n[Detailed description](https://overiq.com/c-programming-101/the-strcmp-function-in-c/)", "code": "#include <stdio.h>\n\n[[int]]\tft_strcmp(char *s1, char *s2)\n{\n\tunsigned int i;\n\n\ti = 0;\n\n\t[[while]](s1[i] == s2[i] && s1[i] != '\\0' || s2[i] != '\\0')\n\t{\n\t\ti++;\n\t}\n\t[[return]] (s1[i] - s2[i]);\n}\n"}, {"name": "ex01", "readme": "## Exercise 07: ft_strncmp\n- Reproduce the behavior of the function __strncmp__ (man strncmp).\n- Here's how it should be prototyped:\n```C\n\tint\tft_strncmp(char *s1, char *s2, unsigned int n);\n```\n\n## Understanding __strncmp__\n\n### Description\nThe strncmp() function is used to compare two strings two strings str1 and str2. If two strings are same then strncmp() returns 0, otherwise, it returns a non-zero value.\nThe strncmp() function compares not more than n characters.  Because strncmp() is designed for comparing strings rather than binary data, characters that appear after a `\\0' character are not compared.\n\n### Return values\nThe strcmp() and strncmp() functions return an integer greater than, equal to, or less than 0, according as the string s1 is greater than, equal to, or less than the string s2.  The comparison is done using unsigned characters, so that '\\200' is greater than '\\0'.\n\n| Value | Meaning |\n|---|----|\n| < 0| str1 < str2\n| 0|str1 == str2\n| > 0  | str1 > str2\n\n## Solution\n- declare an unsigned int variable and initialize it to 0 (index).\n- check if the (n) == 0 is so we return (0).\n- we go through a while loop as long as the nth character from str1 is == to the same nth character from str2. And al song as we didn't reach the end of the str1.\n\t- if (1) is less than (n - 1) (-1 because we start counting from 0)\n\t\t- we increment (1).\n\t- else we return (0), which means str1 and str2 are identical.\n- Finally we return str1[i] - str2[i]. Which means strings are different and we return the different between them.", "code": "#include <stdio.h>\n\n[[int]]\tft_strncmp(char *s1, char *s2, unsigned int n)\n{\n    unsigned int i;\n\n    i = 0;\n\n    [[while]]((s1[i] != '\\0' || s2[i] != '\\0') && i < n)\n    {\n        if (s1[i] != s2[i])\n            [[return]](s1[i] - s2[i]);\n        i++;\n    }\n    return (0);\n}\n"}, {"name": "ex02", "readme": "## Exercise 16: ft_strcat\n- Reproduce the behavior of the function __strcat__ (man strcat).\n- Here's how it should be prototyped:\n```C\n\tchar\t*ft_strcat(char *dest, char *src);\n```\n\n## Understanding strcat\n### Description:\nThe strcat() function concatenates string2 to string1 and ends the resulting string with the null character.\\\nThe strcat() function operates on null-ended strings. The string arguments to the function should contain a null character (\\0) that marks the end of the string. No length checking is performed. You should not use a literal string for a string1 value, although string2 may be a literal string.\\\nIf the storage of string1 overlaps the storage of string2, the behavior is undefined.\n\n### Return value\nThe strcat() function returns a pointer to the concatenated string (string1).\n", "code": "#include <stdio.h>\n\nchar\t*ft_strcat(char *dest, char *src)\n{\n    [[int]] i;\n    int j;\n\n    i = 0;\n\n    [[while]](dest[i])\n    {\n        i++;\n    }\n    j = 0;\n    while(src[j])\n    {\n        dest[i] = src[j];\n        i++;\n        j++;\n    }\n    dest[i] = '\\0';\n    [[return]](dest);\n}\n\nint main()\n{\n    char dest[] = \"hello \";\n    char src[] = \"karim\";\n    printf(\"%s\", ft_strcat(dest, src));\n}"}, {"name": "ex03", "readme": "## Exercise 17: ft_strncat\n- Reproduce the behavior of the function strncat (man strncat).\n- Here's how it should be prototyped:\n```C\n\tchar\t*ft_strncat(char *dest, char *src, int nb);\n```\n\n## Understanding strncat\n### Description:\nThe strncat() function appends the first count characters of string2 to string1 and ends the resulting string with a null character (\\0). If count is greater than the length of string2, the length of string2 is used in place of count.\\\nThe strncat() function operates on null-ended strings. The string argument to the function should contain a null character (\\0) marking the end of the string.\n\n### Return value\nThe strncat() function returns a pointer to the joined string (string1).\n", "code": "#include <stdio.h>\n\nchar\t*ft_strncat(char *dest, char *src, unsigned [[int]] nb)\n{\n    int i;\n    int j;\n\n    i = 0;\n    [[while]](dest[i])\n    {\n        i++;\n    }\n    j = 0;\n    while(j < nb && src[j] != '\\0')\n    {\n        dest[i + j] = src[j];\n        j++;\n    }\n    dest[i + j] = '\\0';\n    [[return]] (dest);\n}\n"}, {"name": "ex04", "readme": " ## Exercise 05: ft_strstr\n\n- Reproduce the behavior of the function __strstr__ (man strstr).\n- Here's how it should be prototyped:\n```C\n\tchar\t*ft_strstr(char *str, char *to_find);\n```\n\n## Understanding strstr\n\n### Description\nThe strstr() function locates the first occurrence of the null-terminated string __to_find__ in the null-terminated string __str__.\n\n### Return values\nIf __to_find__ is an empty string, __str__ is returned; if __to_find__ occurs nowhere in __str__, NULL is returned; otherwise a pointer to the first character of the first occurrence of __to_find__ is returned.\n\n### Example\nThe following sets the pointer ptr to the \"Bar Baz\" portion of str:\n\n```C\n           const char *str= \"Foo Bar Baz\";\n           const char *to_find= \"Bar\";\n           char *ptr;\n\n           ptr = strstr(str, to_find);\n```\n\n## Solution\n1. We declare two index variables\n\t- first one to keep track the count of __str__ characters.\n\t- second one to keep track of the count of __to_find__ characters.\n2. We check if the string __to_find__ is empty, if True we return __str__.\n3. We start a while loop as long as we didn't reach the end of __str__.\n\t- We initialize the second index in (1) to 0 (inside the while loop because sometimes we can find some letters from __to_find__ in __str__ therefore we want to reset the count every time that's happen).\n\t- Go through a nested while loop (4).\n\t- We increment the first index count. (1)\n4. We start a nested while loop inside (3) checking as long as:\n\t- __str__[index 1 + 2] is equal to __to_find__[index 2]: When we enter the nested loop we only increment the second index, the first index is always fixed on the first occurrence of the first character of __to_find__.\n\t- and __str__[index 1 + 2] not the '\\0'. \n\t- As long as it's true we check if the next character of __to_find__ is '\\0', if True we know that we find the first occurrence of __to_find__ and return the address it which is __&str[first index]__ because the count of the first index stops every time we enter the nested loop.\n\t- finally we increment the second index;\n5. If we reached this step that means we didn't find any occurrence of __to_find__ in __str__ so we just return null.\n", "code": "#include <unistd.h>\n#include <stdio.h>\n\n\nchar\t*ft_strstr(char *str, char *to_find)\n{\n    [[int]] i;\n    int j;\n\n    i = 0;\n    j = 0;\n\n    if (to_find[j] == '\\0')\n        [[return]](str);\n    [[while]] (str[i])\n    {\n        while (str[i + j] == to_find[j] && str[i + j] != '\\0')\n            j++;\n        if (to_find[j] == '\\0')\n            return(str + i);\n        i++;\n        j = 0;\n    }\n    return(0);\n}\n"}, {"name": "ex05", "readme": "## Exercise 18: ft_strlcat\n- Reproduce the behavior of the function strlcat (man strcat).\n- Here's how it should be prototyped:\n```C\n\tunsigned int\tft_strlcat(char *dest, char *src, unsigned int size);\n```\n\n## Understanding strlcat\n### Description:\n- strlcat() take the full size of the destination buffer and guarantee NUL-termination if there is room. Note that room for the NUL should be included in dstsize. strlcat() appends string src to the end of dst.  It will append at most dstsize - strlen(dst) - 1 characters. It will then NUL-terminate, unless dstsize is 0 or the original dst string was longer than dstsize (in practice this should not happen as it means that either dstsize is incorrect or that dst is not a proper string). If the src and dst strings overlap, the behavior is undefined.\n\n- The strlcat() function appends at most (dstsize-strlen(dst)-1) characters of src to dst (dstsize being the size of the string buffer dst). If the string pointed to by dst contains a null-terminated string that fits into dstsize bytes when strlcat() is called, the string pointed to by dst will be a null-terminated string that fits in dstsize bytes (including the terminating null character) when it completes, and the initial character of src will override the null character at the end of dst. If the string pointed to by dst is longer than dstsize bytes when strlcat() is called, the string pointed to by dst will not be changed. The function returns min{dstsize,strlen(dst)}+ strlen(src). Buffer overflow can be checked as follows:\n```C\nif (strlcat(dst, src, dstsize) >= dstsize)\n        return \u22121;\n```\n- strlcat() appends up to size-strlen(dst)-1 bytes from the NUL-terminated string src to the end of dst. It takes the full size of the buffer, not only the length, and terminates the result with NUL as long as size is greater than 0. Include a byte for the NUL in your size value.\n\n### Return Value\n- The strlcat() function returns the total length of the string that would have been created if there was unlimited space. This might or might not be equal to the length of the string actually created, depending on whether there was enough space. This means that you can call strlcat() once to find out how much space is required, then allocate it if you do not have enough, and finally call strlcat() a second time to create the required string.\n- If the return value is >= dstsize, the output string has been truncated.  It is the caller's responsibility to handle this.\n\n## Notes\n1. The different between size and length:\n\t- size = includes '\\0'.\n\t- length = doesn't include '\\0'.\n2. Return value: \n\t- When __size__ is less than __dest__ it returns (strlen(src) + size).\n\t- If the size is >= the length of dest it returns (length of dest + length of src).\n\n## Solution\n1. Declarations:\n\t- declare __dest_len__ and initialize it to the length of dest\n\t- declare __src_len__ and initialize it to the length of src\n\t- declare n_size and initialize it to (size - dest_len). /\\* remove the length of dest from the total size \\*/\n2. Check if the input size is greater than the length of dest.\n\t- if True then return the length of dest + size.\n3. Move the pointer to the end of dest by doing through a while loop as long as we didn't reach the null pointer we increment the current pointer.\n4. When we reach the end of the dest string now we go through another while loop to add the src string to the end of dest string.\n\t- as long as we didn't reach the end of the string src and as long as n_size-- is greater than 1 (1 is the place holder for the null character that we gonna append in the end)\n\t- we assign the value of the current pointer of src to the current value of the pointer dest and increment both pointers.\n5. After the loop above finishes we add a null character to the end of concatenated string.\n6. return the length of dest + length of src.\n\n## Another versions\n### My 2nd version\n```C\nunsigned int\tft_strlcat(char *dest, char *src, unsigned int size)\n{\n\tunsigned int\tn_size;\n\tunsigned int\tdest_len;\n\tunsigned int\tsrc_len;\n\n\tdest_len = ft_strlen(dest);\n\tsrc_len = ft_strlen(src);\n\tn_size = size - dest_len;\n\tif (size < dest_len)\n\t\treturn (src_len + size);\n\twhile (*dest)\n\t\tdest++;\n\twhile (*src && n_size-- != 1)\n\t\t*dest++ = *src++;\n\t*dest = '\\0';\n\treturn (dest_len + src_len);\n}\n```\n\n### My 3rd version\n```C\nunsigned int\tft_strlcat(char *dest, char *src, unsigned int size)\n{\n\tchar\t*d;\n\tchar\t*s;\n\tunsigned int\tnew_size;\n\tunsigned int\tdest_len;\n\tunsigned int\tsrc_len;\n\n\td = dest;\n\ts = src;\n\tdest_len = strlen(dest);\n\tsrc_len = strlen(src);\n\tnew_size = size - dest_len;\n\tif (size < dest_len)\n\t\treturn (src_len + size);\n\tif (size == dest_len)\n\t\treturn (dest_len + src_len);\n\twhile (*d)\n\t\td++;\n\twhile (*s && new_size-- != 1)\n\t\t*d++ = *s++;\n\t*d = '\\0';\n\treturn (dest_len + src_len);\n}\n```\n\n### Apple/Google version\n```C\nunsigned int\tft_strlcat(char *dest, char *src, unsigned int size)\n{\n\tint\tc;\n\tchar\t*d;\n\tchar\t*s;\n\tint\tdest_len;\n\n\td = dest;\n\ts = src;\n\tc = size;\n\twhile (c-- != 0 && *d != '\\0')\n\t\td++;\n\tdest_len = d - dest;\n\tc = size - dest_len;\n\tif (c == 0)\n\t\treturn (dest_len + ft_strlen(src));\n\twhile (*s != '\\0')\n\t{\n\t\tif (c != 1)\n\t\t{\n\t\t\t*d++ = *s;\n\t\t\tc--;\n\t\t}\n\t\ts++;\n\t}\n\t*d = '\\0';\n\treturn (dest_len + (s - src));\n}\n```", "code": "#include <stdio.h>\n\n[[int]] \tft_strlen(char *str)\n{\n\tint i;\n\t\n\ti = 0;\n\t[[while]] (str[i])\n\t{\n\t\ti++;\n\t}\n\t[[return]](i);\n}\n\nunsigned int\tft_strlcat(char *dest, char *src, unsigned int size)\n{\n\tint i;\n\tint j;\n\tint dlen;\n\tint slen;\n\n\ti = 0;\n\tj = 0;\n\twhile (dest[j])\n\t{\n\t\tj++;\n\t}\n\tdlen = j;\n\tslen = ft_strlen(src);\n\tif (size == 0 || size < dlen)\n\t\treturn (slen + size);\n\twhile (src[i] != '\\0' && i < size - dlen - 1)\n\t{\n\t\tdest[j] = src[i];\n\t\ti++;\n\t\tj++;\n\t}\n\tdest[j] = '\\0';\n\treturn (dlen + slen);\n}\n"}]}, {"day": "C04", "exercises": [{"name": "ex00", "readme": "## EXERCISE 00\n* Create a function that counts and returns the number of characters in a string.\n* Here\u2019s how it should be prototyped :\n```C\nint ft_strlen(char *str);\n```", "code": ""}, {"name": "ex01", "readme": "## Exercise 01: ft_putstr\n\n- Create a function that displays a string of characters on the standard output.\n- Here's how it should be prototyped:\n```C\n  void\tft_putstr(char *str);\n```\n- Allowed function: ft_putchar.\n", "code": "#include <unistd.h>\n\n[[void]]\tft_putstr(char *str)\n{\n    [[int]] i;\n\n    i = 0;\n    [[while]](str[i])\n    {\n        write(1, &str[i], 1);\n        i++;\n    }\n}\n"}, {"name": "ex02", "readme": "## Exercise 02: ft_putnbr\n\n- Create a function that displays the number entered as a parameter. The function has to be able to display all possible values within an __int__ type variable.\n- Here's how it should be prototyped:\n```C\n   void    ft_putnbr(int nb);\n```\n- For example:\n\t- ft_putnbr(1337) displays \"42\";\n- Allowed functions: ft_putchar.", "code": "#include <stdio.h>\n\n[[void]]    ft_putchar([[char]] c)\n{\n    write(1, &c, 1);\n}\n\nvoid    ft_putnbr([[int]] nb)\n{\n    if (nb == -2147483648)\n    {\n        ft_putchar('-');\n        ft_putchar('2');\n        ft_putnbr('147483648');\n    }\n    if (nb < 0)\n    {\n        ft_putchar('-');\n        nb *= -1;\n        ft_putnbr(nb);\n    }\n    if (nb > 9)\n    {\n        ft_putnbr(nb /10);\n        ft_putnbr(nb % 10);\n    }\n    else\n        ft_putchar(nb + 48);\n\n}\n"}, {"name": "ex03", "readme": "## Exercise 03: ft_atoi\n+ Reproduce the behavior of the function atoi (man atoi).\n+ Here's how it should be prototyped:\n```C\nint\tft_atoi(char *str);\n```\n+ Files to turn in: ft_atoi.c\n+ Allowed functions: Nothing\n\n## [atoi  description](https://www.ibm.com/docs/en/i/7.4?topic=functions-atoi-convert-character-string-integer)\n+ The atoi() function converts a character string to an integer value. The input string is a sequence of characters that can be interpreted as a numeric value of the specified return type. The function stops reading the input string at the first character that it cannot recognize as part of a number. This character can be the null character that ends the string.\n* The atoi() function does not recognize decimal points or exponents. The string argument for this function has the form:\\\n\t`whitespaces +/- digits`\n* whitespace characters are space `(' ')`, tab `('\\t')`, carriage return `('\\r')`, newline `('\\n')`, vertical tab `('\\v')` and formfeed `('\\f')`.\n* where whitespace consists of the same characters for which the isspace() function is true, such as spaces and tabs. The atoi() function ignores leading white-space characters. The value digits represents one or more decimal digits.\n* Return value: The atoi() function returns an int value that is produced by interpreting the input characters as a number. The return value is 0 if the function cannot convert the input to a value of that type. The return value is undefined in the case of an overflow.\n\n## Notes\n- Using (\\*str++) instead of \"**i**\" won't work! it's gonna work just for the first time.\n\t- \\*str++: pointer arithmetic.\n\t- i: using index.", "code": "/* ************************************************************************** */\n/*                                                                            */\n/*                                                        :::      ::::::::   */\n/*   ft_atoi.c                                          :+:      :+:    :+:   */\n/*                                                    +:+ +:+         +:+     */\n/*   By: abmouhou <thelegendofdesigner@gmail.com    +#+  +:+       +#+        */\n/*                                                +#+#+#+#+#+   +#+           */\n/*   Created: 2023/08/11 17:35:27 by abmouhou          #+#    #+#             */\n/*   Updated: 2023/08/11 17:35:27 by abmouhou         ###   ########.fr       */\n/*                                                                            */\n/* ************************************************************************** */\n\n#include <unistd.h>\n\n[[int]]\twhitespaces(char *str, int *ptr_i)\n{\n\tint\tcount;\n\tint\ti;\n\n\ti = 0;\n\tcount = 1;\n\t[[while]] ((str[i] >= 9 && str[i] <= 13) || str[i] == 32)\n\t\ti++;\n\twhile (str[i] && (str[i] == 43 || str[i] == 45))\n\t{\n\t\tif (str[i] == 45)\n\t\t\tcount *= -1;\n\t\ti++;\n\t}\n\t*ptr_i = i;\n\t[[return]] (count);\n}\n\nint\tft_atoi(char *str)\n{\n\tint\tsign;\n\tint\tresult;\n\tint\ti;\n\n\tresult = 0;\n\tsign = whitespaces(str, &i);\n\twhile (str[i] && str[i] >= 48 && str[i] <= 57)\n\t{\n\t\tresult *= 10;\n\t\tresult += str[i] - 48;\n\t\ti++;\n\t}\n\tresult *= sign;\n\treturn (result);\n}\n"}, {"name": "ex04", "readme": "## Exercise 04: ft_putnbr_base\n- Create a function that displays a number in a base system onscreen.\n- This number is given in the shape of an int, and the radix in the shape of a string of characters.\n- The base-system contains all useable symbols to display that number:\n\t- 0123456789 is the commonly used base system to represent decimal numbers;\n\t- 01 is a binary base system;\n\t- 0123456789ABCDEF an hexadecimal base system;\n\t- poneyvif is an octal base system.\n- The function must handle negative numbers.\n- If there's an invalid argument, nothing should be displayed. Example of invalid arguments:\n\t- base is empty or size of 1;\n\t- base contains the same character twice;\n\t- base contains + or -;\n\t- etc.\n- Here's how it should be prototyped:\n```C\n\tvoid\tft_putnbr_base(int nbr, char *base);\n```\n\n## Solution\n1. ft_putnbr_base function\n\t- declare a function __nbase__ to hold to return value of the \"check_base\" function.\n\t- if __nbase__ is greater or equal to 2 and less or equal to 16 (means in the range of the different bases)\n\t\t- if nbr is negative we print '-' and turn the number positive (same as putnbr).\n\t\t- if number is greater or equal to __nbase__ we call the __ft_putnbr_base__ function recursively (same as putnbr)\n\t\t- print base[nbr % base];\n\n2. check_base function\n\t-
